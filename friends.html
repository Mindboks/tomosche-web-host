<script src="js/template.js"></script>
<script>
    const content = `
        <div class="d-flex align-items-center mb-3">
            <button class="back-btn" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>
            <h1 class="page-title">Friends</h1>
        </div>
        <div id="friendList"></div>
        <div id="deleteModal"></div>
    `;
    renderPage('Friends', content, 'friends');
</script>
<script>
    // 友達一覧ロジック
    const friends = [
        { id: 1, name: 'Tanaka Ichiro', initial: '田', status: 'shared' },
        { id: 2, name: 'Sato Hanako', initial: '佐', status: 'pending' },
        { id: 3, name: 'Suzuki Makoto', initial: '鈴', status: 'shared' },
        { id: 4, name: 'Yamada Taro', initial: '山', status: 'shared' },
    ];
    function renderFriends() {
        const c = document.getElementById('friendList');
        if (!friends.length) {
            c.innerHTML = `<div class="empty-state"><i class="bi bi-people"></i><p>No friends yet</p></div>`;
            return;
        }
        c.innerHTML = friends.map(f => `
            <div class="friend-item">
                <div class="friend-avatar">${f.initial}</div>
                <div class="friend-info">
                    <div class="friend-name">${f.name}</div>
                    <div class="friend-status ${f.status === 'shared' ? 'status-shared' : 'status-pending'}">
                        ${f.status === 'shared' ? '✓ Calendar shared' : '⏳ Pending approval'}
                    </div>
                </div>
                <button class="delete-btn" onclick="confirmDelete(${f.id}, '${f.name}')"><i class="bi bi-trash3"></i></button>
            </div>
        `).join('');
    }
    function confirmDelete(id, name) {
        document.getElementById('deleteModal').innerHTML = `
            <div class="modal-overlay-danger">
                <div class="modal-box-danger">
                    <div class="modal-icon"><i class="bi bi-exclamation-triangle"></i></div>
                    <div class="modal-title">Delete friend?</div>
                    <div class="modal-desc">Remove "${name}"? This cannot be undone.</div>
                    <div class="modal-actions">
                        <button class="modal-btn modal-btn-cancel" onclick="document.getElementById('deleteModal').innerHTML=''">Cancel</button>
                        <button class="modal-btn modal-btn-delete" onclick="deleteFriend(${id})">Delete</button>
                    </div>
                </div>
            </div>
        `;
    }
    function deleteFriend(id) {
        const idx = friends.findIndex(f => f.id === id);
        if (idx !== -1) friends.splice(idx, 1);
        document.getElementById('deleteModal').innerHTML = '';
        renderFriends();
        const t = document.createElement('div');
        t.className = 'custom-toast';
        t.textContent = '✅ Friend removed';
        document.body.appendChild(t);
        setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2000);
    }
    document.addEventListener('DOMContentLoaded', renderFriends);
</script>
