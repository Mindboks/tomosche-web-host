<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Friends - Tomosche</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-auth-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/app.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="d-flex align-items-center mb-3">
            <button class="back-btn" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>
            <h1 class="page-title">Friends</h1>
        </div>
        <div id="friendList"></div>
        <div id="deleteModal"></div>
    </div>

    <div class="bottom-nav">
        <a href="/" class="nav-item"><i class="bi bi-house-fill"></i><span>Home</span></a>
        <a href="friends.html" class="nav-item active"><i class="bi bi-people-fill"></i><span>Friends</span></a>
        <a href="schedule.html" class="nav-item"><i class="bi bi-calendar-event-fill"></i><span>Calendar</span></a>
        <a href="add_friends.html" class="nav-item"><i class="bi bi-person-plus-fill"></i><span>Add</span></a>
        <div class="nav-item" id="moreMenuBtn"><i class="bi bi-grid-fill"></i><span>More</span></div>
    </div>

    <script>
        // ================================================================
        // 友達データ
        // ================================================================
        const friends = [
            { id: 1, name: 'Tanaka Ichiro', initial: '田', status: 'shared' },
            { id: 2, name: 'Sato Hanako', initial: '佐', status: 'pending' },
            { id: 3, name: 'Suzuki Makoto', initial: '鈴', status: 'shared' },
            { id: 4, name: 'Yamada Taro', initial: '山', status: 'shared' },
        ];

        function getStatusLabel(s) { return s === 'shared' ? '✓ Calendar shared' : '⏳ Pending approval'; }
        function getStatusClass(s) { return s === 'shared' ? 'status-shared' : 'status-pending'; }

        function renderFriends() {
            const c = document.getElementById('friendList');
            if (!friends.length) {
                c.innerHTML = `<div class="empty-state"><i class="bi bi-people"></i><p>No friends yet</p></div>`;
                return;
            }
            c.innerHTML = friends.map(f => `
                <div class="friend-item">
                    <div class="friend-avatar">${f.initial}</div>
                    <div class="friend-info">
                        <div class="friend-name">${f.name}</div>
                        <div class="friend-status ${getStatusClass(f.status)}">${getStatusLabel(f.status)}</div>
                    </div>
                    <button class="delete-btn" onclick="confirmDelete(${f.id}, '${f.name}')"><i class="bi bi-trash3"></i></button>
                </div>
            `).join('');
        }

        function confirmDelete(id, name) {
            document.getElementById('deleteModal').innerHTML = `
                <div class="modal-overlay-danger" id="delOverlay">
                    <div class="modal-box-danger">
                        <div class="modal-icon"><i class="bi bi-exclamation-triangle"></i></div>
                        <div class="modal-title">Delete friend?</div>
                        <div class="modal-desc">Remove "${name}"? This cannot be undone.</div>
                        <div class="modal-actions">
                            <button class="modal-btn modal-btn-cancel" onclick="document.getElementById('deleteModal').innerHTML=''">Cancel</button>
                            <button class="modal-btn modal-btn-delete" onclick="deleteFriend(${id})">Delete</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function deleteFriend(id) {
            const idx = friends.findIndex(f => f.id === id);
            if (idx !== -1) friends.splice(idx, 1);
            document.getElementById('deleteModal').innerHTML = '';
            renderFriends();
            const t = document.createElement('div');
            t.className = 'custom-toast';
            t.textContent = '✅ Friend removed';
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2000);
        }

        document.addEventListener('DOMContentLoaded', renderFriends);
    </script>
</body>
</html>
