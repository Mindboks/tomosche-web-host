    <script>
        // ====== 友達データ ======
        const rawFriends = [
            '青山 隆','赤井 美香','秋山 健太','浅野 裕子','安藤 誠',
            '石井 秀樹','伊藤 真由美','井上 達也','岩崎 千尋','上田 公平',
            '遠藤 翔太','大川 さやか','大野 浩二','岡田 奈々','小川 和也',
            '加藤 彩乃','河野 哲也','木村 直人','工藤 明日香','久保 優子',
            '小林 正明','佐々木 健','佐藤 花子','鈴木 誠','関 健一',
            '高橋 美咲','田中 一郎','谷口 真由','千葉 翔','中村 みな',
            '中山 聖也','西村 好美','野口 大輔','長谷川 陽子','浜田 健吾',
            '林 香織','原田 博之','日高 宏','平野 奈緒','藤田 理沙',
            '古川 正人','細川 裕太','前田 夏美','松本 勇気','三浦 優希',
            '宮崎 綾','村上 真一','森 萌','山田 太郎','渡辺 美咲'
        ];

        let sampleFriends = rawFriends.map((name, index) => ({
            id: index + 1,
            name: name,
            initial: name.charAt(0),
            status: index % 3 === 0 ? 'shared' : 'pending'
        }));

        function getStatusLabel(status) {
            return status === 'shared' ? '✓ カレンダー共有中' : '⏳ 招待承認待ち';
        }

        function getStatusClass(status) {
            return status === 'shared' ? 'status-shared' : 'status-pending';
        }

        function renderFriends(friends) {
            const container = document.getElementById('friendListContainer');
            if (!friends || friends.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="bi bi-people"></i><p>まだ友達がいません</p></div>`;
                return;
            }
            let html = '';
            friends.forEach(friend => {
                html += `
                    <div class="friend-item" data-id="${friend.id}">
                        <div class="friend-avatar">${friend.initial}</div>
                        <div class="friend-info">
                            <div class="friend-name">${friend.name}</div>
                            <div class="friend-status ${getStatusClass(friend.status)}">${getStatusLabel(friend.status)}</div>
                        </div>
                        <button class="delete-btn" data-id="${friend.id}" data-name="${friend.name}"><i class="bi bi-trash3"></i></button>
                    </div>
                `;
            });
            container.innerHTML = html;
            container.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = parseInt(this.dataset.id);
                    const name = this.dataset.name;
                    showDeleteModal(id, name);
                });
            });
        }

        function showDeleteModal(friendId, friendName) {
            const container = document.getElementById('deleteModalContainer');
            container.innerHTML = `
                <div class="modal-overlay" id="deleteModalOverlay">
                    <div class="modal-box">
                        <div class="modal-icon"><i class="bi bi-exclamation-triangle"></i></div>
                        <div class="modal-title">友達を削除しますか？</div>
                        <div class="modal-desc">「${friendName}」さんを削除します。この操作は元に戻せません。</div>
                        <div class="modal-actions">
                            <button class="modal-btn modal-btn-cancel" id="modalCancelBtn">キャンセル</button>
                            <button class="modal-btn modal-btn-delete" id="modalConfirmBtn">削除する</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('modalCancelBtn').addEventListener('click', () => container.innerHTML = '');
            document.getElementById('modalConfirmBtn').addEventListener('click', () => {
                const index = sampleFriends.findIndex(f => f.id === friendId);
                if (index !== -1) sampleFriends.splice(index, 1);
                container.innerHTML = '';
                renderFriends(sampleFriends);
                showToast('友達を削除しました');
            });
            document.getElementById('deleteModalOverlay').addEventListener('click', function(e) {
                if (e.target === this) container.innerHTML = '';
            });
        }

        function showToast(message) {
            const existing = document.querySelector('.custom-toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'custom-toast';
            toast.innerHTML = `<i class="bi bi-check-circle" style="color: #06C755; margin-right: 8px;"></i>${message}`;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2000);
        }

        // ====== LIFF初期化 ======
        document.addEventListener('DOMContentLoaded', async function() {
            const success = await initLiff();
            if (success) {
                renderFriends(sampleFriends);
            }

            // Moreメニュー
            document.getElementById('moreMenuBtn').addEventListener('click', function() {
                const popup = document.getElementById('moreMenuPopup');
                popup.style.display = (popup.style.display === 'none' || popup.style.display === '') ? 'block' : 'none';
            });

            document.getElementById('logoutMoreBtn').addEventListener('click', function(e) {
                e.preventDefault();
                if (confirm('ログアウトしますか？')) logout();
            });

            document.getElementById('feedbackMoreBtn').addEventListener('click', function(e) {
                e.preventDefault();
                alert('📝 フィードバック機能は準備中です。\ntomosche.line@gmail.com へご連絡ください。');
            });

            document.addEventListener('click', function(e) {
                const popup = document.getElementById('moreMenuPopup');
                if (popup.style.display === 'block') {
                    if (!e.target.closest('#moreMenuPopup') && !e.target.closest('#moreMenuBtn')) {
                        popup.style.display = 'none';
                    }
                }
            });
        });
    </script>
</body>
</html>

            <button onclick="document.getElementById('moreMenuPopup').style.display='none'" style="background:none; border:none; color:#999; font-size:13px; padding:4px 16px; cursor:pointer;">閉じる</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        // ====== 友達データ ======
        const rawFriends = [
            '青山 隆','赤井 美香','秋山 健太','浅野 裕子','安藤 誠',
            '石井 秀樹','伊藤 真由美','井上 達也','岩崎 千尋','上田 公平',
            '遠藤 翔太','大川 さやか','大野 浩二','岡田 奈々','小川 和也',
            '加藤 彩乃','河野 哲也','木村 直人','工藤 明日香','久保 優子',
            '小林 正明','佐々木 健','佐藤 花子','鈴木 誠','関 健一',
            '高橋 美咲','田中 一郎','谷口 真由','千葉 翔','中村 みな',
            '中山 聖也','西村 好美','野口 大輔','長谷川 陽子','浜田 健吾',
            '林 香織','原田 博之','日高 宏','平野 奈緒','藤田 理沙',
            '古川 正人','細川 裕太','前田 夏美','松本 勇気','三浦 優希',
            '宮崎 綾','村上 真一','森 萌','山田 太郎','渡辺 美咲'
        ];

        let sampleFriends = rawFriends.map((name, index) => ({
            id: index + 1,
            name: name,
            initial: name.charAt(0),
            status: index % 3 === 0 ? 'shared' : 'pending'
        }));

        function getStatusLabel(status) {
            return status === 'shared' ? '✓ カレンダー共有中' : '⏳ 招待承認待ち';
        }

        function getStatusClass(status) {
            return status === 'shared' ? 'status-shared' : 'status-pending';
        }

        function renderFriends(friends) {
            const container = document.getElementById('friendListContainer');
            if (!friends || friends.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="bi bi-people"></i><p>まだ友達がいません</p></div>`;
                return;
            }
            let html = '';
            friends.forEach(friend => {
                html += `
                    <div class="friend-item" data-id="${friend.id}">
                        <div class="friend-avatar">${friend.initial}</div>
                        <div class="friend-info">
                            <div class="friend-name">${friend.name}</div>
                            <div class="friend-status ${getStatusClass(friend.status)}">${getStatusLabel(friend.status)}</div>
                        </div>
                        <button class="delete-btn" data-id="${friend.id}" data-name="${friend.name}"><i class="bi bi-trash3"></i></button>
                    </div>
                `;
            });
            container.innerHTML = html;
            container.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = parseInt(this.dataset.id);
                    const name = this.dataset.name;
                    showDeleteModal(id, name);
                });
            });
        }

        function showDeleteModal(friendId, friendName) {
            const container = document.getElementById('deleteModalContainer');
            container.innerHTML = `
                <div class="modal-overlay" id="deleteModalOverlay">
                    <div class="modal-box">
                        <div class="modal-icon"><i class="bi bi-exclamation-triangle"></i></div>
                        <div class="modal-title">友達を削除しますか？</div>
                        <div class="modal-desc">「${friendName}」さんを削除します。この操作は元に戻せません。</div>
                        <div class="modal-actions">
                            <button class="modal-btn modal-btn-cancel" id="modalCancelBtn">キャンセル</button>
                            <button class="modal-btn modal-btn-delete" id="modalConfirmBtn">削除する</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('modalCancelBtn').addEventListener('click', () => container.innerHTML = '');
            document.getElementById('modalConfirmBtn').addEventListener('click', () => {
                const index = sampleFriends.findIndex(f => f.id === friendId);
                if (index !== -1) sampleFriends.splice(index, 1);
                container.innerHTML = '';
                renderFriends(sampleFriends);
                showToast('友達を削除しました');
            });
            document.getElementById('deleteModalOverlay').addEventListener('click', function(e) {
                if (e.target === this) container.innerHTML = '';
            });
        }

        function showToast(message) {
            const existing = document.querySelector('.custom-toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'custom-toast';
            toast.innerHTML = `<i class="bi bi-check-circle" style="color: #06C755; margin-right: 8px;"></i>${message}`;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2000);
        }

        // ====== LIFF初期化 ======
        document.addEventListener('DOMContentLoaded', async function() {
            const success = await initLiff();
            if (success) {
                renderFriends(sampleFriends);
            }

            // Moreメニュー
            document.getElementById('moreMenuBtn').addEventListener('click', function() {
                const popup = document.getElementById('moreMenuPopup');
                popup.style.display = (popup.style.display === 'none' || popup.style.display === '') ? 'block' : 'none';
            });

            document.getElementById('logoutMoreBtn').addEventListener('click', function(e) {
                e.preventDefault();
                if (confirm('ログアウトしますか？')) logout();
            });

            document.getElementById('feedbackMoreBtn').addEventListener('click', function(e) {
                e.preventDefault();
                alert('📝 フィードバック機能は準備中です。\ntomosche.line@gmail.com へご連絡ください。');
            });

            document.addEventListener('click', function(e) {
                const popup = document.getElementById('moreMenuPopup');
                if (popup.style.display === 'block') {
                    if (!e.target.closest('#moreMenuPopup') && !e.target.closest('#moreMenuBtn')) {
                        popup.style.display = 'none';
                    }
                }
            });
        });
    </script>
</body>
</html>
