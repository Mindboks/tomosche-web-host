<script src="js/template.js"></script>
<script>
    const rawFriends = ['青山 隆','赤井 美香','秋山 健太','浅野 裕子','安藤 誠','石井 秀樹','伊藤 真由美','井上 達也','岩崎 千尋','上田 公平','遠藤 翔太','大川 さやか','大野 浩二','岡田 奈々','小川 和也','加藤 彩乃','河野 哲也','木村 直人','工藤 明日香','久保 優子','小林 正明','佐々木 健','佐藤 花子','鈴木 誠','関 健一','高橋 美咲','田中 一郎','谷口 真由','千葉 翔','中村 みな','中山 聖也','西村 好美','野口 大輔','長谷川 陽子','浜田 健吾','林 香織','原田 博之','日高 宏','平野 奈緒','藤田 理沙','古川 正人','細川 裕太','前田 夏美','松本 勇気','三浦 優希','宮崎 綾','村上 真一','森 萌','山田 太郎','渡辺 美咲'];
    let friends = rawFriends.map((n,i)=>({id:i+1,name:n,initial:n.charAt(0),status:i%3===0?'shared':'pending'}));

    function renderList(f) {
        const c = document.getElementById('list');
        if (!f||!f.length) { c.innerHTML='<div style="text-align:center;padding:40px;color:#999;">まだ友達がいません</div>'; return; }
        c.innerHTML = f.map(fr => `
            <div style="display:flex;align-items:center;padding:14px 0;border-bottom:1px solid #f0f4f8;">
                <div style="width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:18px;background:#e8f5e9;color:#2e7d32;margin-right:14px;">${fr.initial}</div>
                <div style="flex:1;"><div style="font-weight:600;color:#333;">${fr.name}</div><div style="font-size:12px;color:${fr.status==='shared'?'#2e7d32':'#ff9800'};">${fr.status==='shared'?'✓ カレンダー共有中':'⏳ 招待承認待ち'}</div></div>
                <button onclick="del(${fr.id})" style="background:none;border:none;color:#ccc;font-size:20px;cursor:pointer;padding:8px;"><i class="bi bi-trash3"></i></button>
            </div>
        `).join('');
    }

    window.del = function(id) {
        if (confirm('削除しますか？')) {
            friends = friends.filter(f => f.id !== id);
            renderList(friends);
        }
    };

    const content = `
    <div style="padding:16px 0;">
        <div class="d-flex align-items-center mb-3">
            <button class="back-btn" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>
            <h1 class="page-title">友達一覧</h1>
        </div>
        <div id="list"></div>
    </div>
    `;

    renderPage('友達一覧', content);
    document.addEventListener('DOMContentLoaded', ()=> renderList(friends));
</script>
