<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomosche - 友助</title>
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #666;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #06C755;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>読み込み中...</div>
    </div>

    <script>
        // LIFF ID（あなたのIDに変更済み）
        const liffId = '2010384200-BS1cr2CR';
        
        // LIFF初期化とFlutter起動
        window.addEventListener('load', async () => {
            try {
                // LIFF初期化
                await liff.init({ liffId: liffId });
                console.log('✅ LIFF initialized');
                
                // ログイン状態をグローバル変数に保存
                window.isLoggedIn = liff.isLoggedIn();
                
                if (window.isLoggedIn) {
                    window.idToken = liff.getIDToken();
                    const profile = await liff.getProfile();
                    window.profile = profile;
                    console.log('✅ Logged in as:', profile.displayName);
                } else {
                    console.log('❌ Not logged in');
                }
            } catch (err) {
                console.error('❌ LIFF init error:', err);
                window.isLoggedIn = false;
                window.liffError = err.message;
            } finally {
                // ローディング表示を維持したままFlutterを起動
                // Flutterが起動したらローディングは自動的に消える
                const script = document.createElement('script');
                script.src = 'flutter_bootstrap.js';
                script.async = false;
                document.body.appendChild(script);
            }
        });
    </script>
</body>
</html>
