<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Calendar - Tomosche</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-auth-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/app.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="d-flex align-items-center mb-2">
            <button class="back-btn" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>
            <h1 class="page-title">Calendar</h1>
        </div>
        <div class="cal-nav">
            <button id="prevBtn"><i class="bi bi-chevron-left"></i></button>
            <span id="calTitle" style="font-size:clamp(1.1rem,3vw,1.4rem);font-weight:600;color:#333;"></span>
            <button id="nextBtn"><i class="bi bi-chevron-right"></i></button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="event-list">
            <div style="font-size:14px;font-weight:600;color:#666;margin-bottom:8px;">📋 Events for this day</div>
            <div id="eventList"><div class="empty-events">Select a date</div></div>
        </div>
    </div>

    <!-- 予定追加ボタン（モーダルを表示） -->
    <button class="add-event-btn" onclick="openAddEventModal(selectedDate || 'Select a date')"><i class="bi bi-plus-lg"></i></button>

    <!-- 予定追加モーダル -->
    <div class="modal-overlay" id="addEventModal">
        <div class="modal-box">
            <h3>📝 New Event</h3>
            <p style="font-size:13px;color:#888;" id="modalDate">Select a date</p>
            <label>👤 Select a friend</label>
            <select id="friendSelect"><option value="">-- Select a friend --</option></select>
            <label>📌 Event name</label>
            <input type="text" id="eventTitle" placeholder="e.g. Lunch, Meeting..." />
            <div class="time-row">
                <div><label>⏰ Start</label><input type="time" id="eventStart" step="900" /></div>
                <div><label>⏰ End</label><input type="time" id="eventEnd" step="900" /></div>
            </div>
            <label>📝 Note (optional)</label>
            <textarea id="eventNote" rows="2" placeholder="Add details..."></textarea>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeAddEventModal()">Cancel</button>
                <button class="btn-primary" id="confirmAddEventBtn" onclick="confirmAddEvent()" disabled>Submit</button>
            </div>
            <div id="addEventStatus" style="margin-top:12px;font-size:13px;text-align:center;display:none;"></div>
        </div>
    </div>

    <!-- 下部ナビ -->
    <div class="bottom-nav">
        <a href="/" class="nav-item"><i class="bi bi-house-fill"></i><span>Home</span></a>
        <a href="friends.html" class="nav-item"><i class="bi bi-people-fill"></i><span>Friends</span></a>
        <a href="schedule.html" class="nav-item active"><i class="bi bi-calendar-event-fill"></i><span>Calendar</span></a>
        <a href="add_friends.html" class="nav-item"><i class="bi bi-person-plus-fill"></i><span>Add</span></a>
        <div class="nav-item" id="moreMenuBtn"><i class="bi bi-grid-fill"></i><span>More</span></div>
    </div>

    <!-- Moreポップアップ -->
    <div class="more-popup" id="moreMenuPopup">
        <div class="more-grid">
            <a href="guide.html"><div class="icon-box"><i class="bi bi-book" style="color:#6a1b9a;"></i></div><span>Guide</span></a>
            <a href="privacy.html"><div class="icon-box"><i class="bi bi-shield-lock" style="color:#1565c0;"></i></div><span>Privacy</span></a>
            <a href="terms.html"><div class="icon-box"><i class="bi bi-file-text" style="color:#e65100;"></i></div><span>Terms</span></a>
            <a href="#" id="feedbackMoreBtn"><div class="icon-box"><i class="bi bi-chat-dots" style="color:#f9a825;"></i></div><span>Feedback</span></a>
            <a href="#" id="logoutMoreBtn"><div class="icon-box"><i class="bi bi-box-arrow-right" style="color:#e53935;"></i></div><span>Logout</span></a>
        </div>
        <div class="more-close"><button onclick="document.getElementById('moreMenuPopup').style.display='none'">Close</button></div>
    </div>

    <script>
        // ================================================================
        // カレンダーロジック
        // ================================================================
        const events = {
            '2026-07-20': [{ time: '10:00', title: 'Meeting with Tanaka', person: 'Tanaka', status: 'confirmed' }],
            '2026-07-22': [{ time: '09:00', title: 'Morning meeting', person: 'Suzuki', status: 'pending' }]
        };
        let year = new Date().getFullYear(), month = new Date().getMonth();
        let selectedDate = null;

        function renderCal(y, m) {
            const grid = document.getElementById('calGrid');
            document.getElementById('calTitle').textContent = `${y}年 ${m+1}月`;
            const first = new Date(y, m, 1).getDay();
            const last = new Date(y, m+1, 0).getDate();
            const today = new Date();
            let html = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(w => `<div class="cal-weekday">${w}</div>`).join('');
            for (let i = 0; i < first; i++) {
                html += `<div class="cal-day other">${new Date(y,m,0).getDate()-first+i+1}</div>`;
            }
            for (let d = 1; d <= last; d++) {
                const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isToday = y===today.getFullYear() && m===today.getMonth() && d===today.getDate();
                const ev = events[ds] || [];
                const hasPending = ev.some(e => e.status === 'pending');
                const hasConfirmed = ev.some(e => e.status === 'confirmed');
                const sel = selectedDate === ds;
                let cls = 'cal-day';
                if (isToday) cls += ' today';
                if (sel) cls += ' selected';
                let dot = '';
                if (hasPending) dot += `<div class="dot pending"></div>`;
                if (hasConfirmed) dot += `<div class="dot confirmed"></div>`;
                html += `<div class="${cls}" onclick="selectDate('${ds}')">${d}${dot}</div>`;
            }
            grid.innerHTML = html;
        }

        function selectDate(ds) {
            selectedDate = ds;
            renderCal(year, month);
            const el = document.getElementById('eventList');
            const ev = events[ds] || [];
            if (!ev.length) { el.innerHTML = '<div class="empty-events">📭 No events on this day</div>'; return; }
            el.innerHTML = ev.map(e => `
                <div class="event-item">
                    <span class="event-time ${e.status}">${e.time}</span>
                    <span class="event-title">${e.title}</span>
                    <span class="event-person">👤 ${e.person}</span>
                    <span class="event-badge ${e.status}">${e.status === 'confirmed' ? '✅ Confirmed' : '⏳ Pending'}</span>
                </div>
            `).join('');
        }

        document.getElementById('prevBtn').addEventListener('click', () => { month--; if (month < 0) { month = 11; year--; } renderCal(year, month); });
        document.getElementById('nextBtn').addEventListener('click', () => { month++; if (month > 11) { month = 0; year++; } renderCal(year, month); });

        // ================================================================
        // 予定追加モーダル
        // ================================================================
        function openAddEventModal(dateStr) {
            document.getElementById('modalDate').textContent = dateStr || 'Select a date';
            document.getElementById('addEventModal').style.display = 'flex';
            document.getElementById('confirmAddEventBtn').disabled = true;
            document.getElementById('addEventStatus').style.display = 'none';
            // 友達選択肢をリセット
            const select = document.getElementById('friendSelect');
            select.innerHTML = '<option value="">-- Select a friend --</option>';
            ['Friend A', 'Friend B', 'Friend C'].forEach(f => {
                const opt = document.createElement('option');
                opt.value = f;
                opt.textContent = f;
                select.appendChild(opt);
            });
        }

        function closeAddEventModal() {
            document.getElementById('addEventModal').style.display = 'none';
        }

        function checkAddEventForm() {
            const title = document.getElementById('eventTitle').value.trim();
            const start = document.getElementById('eventStart').value;
            const end = document.getElementById('eventEnd').value;
            const friend = document.getElementById('friendSelect').value;
            document.getElementById('confirmAddEventBtn').disabled = !(title && start && end && friend);
        }

        function confirmAddEvent() {
            const title = document.getElementById('eventTitle').value.trim();
            const start = document.getElementById('eventStart').value;
            const end = document.getElementById('eventEnd').value;
            const friend = document.getElementById('friendSelect').value;
            const status = document.getElementById('addEventStatus');

            if (!title || !start || !end || !friend) {
                status.style.display = 'block';
                status.style.color = '#e53935';
                status.textContent = 'Please fill in all fields.';
                return;
            }
            if (start >= end) {
                status.style.display = 'block';
                status.style.color = '#e53935';
                status.textContent = '⚠️ End time must be after start time.';
                return;
            }
            // 予定を追加（サンプル）
            const dateStr = selectedDate || new Date().toISOString().split('T')[0];
            if (!events[dateStr]) events[dateStr] = [];
            events[dateStr].push({ time: start, endTime: end, title, person: friend, status: 'pending' });
            status.style.display = 'block';
            status.style.color = '#06C755';
            status.textContent = '✅ Event added!';
            setTimeout(() => {
                closeAddEventModal();
                renderCal(year, month);
                selectDate(selectedDate);
            }, 1500);
        }

        // 入力チェック
        ['eventTitle', 'eventStart', 'eventEnd'].forEach(id => {
            document.getElementById(id).addEventListener('input', checkAddEventForm);
        });
        document.getElementById('friendSelect').addEventListener('change', checkAddEventForm);

        // モーダル外クリックで閉じる
        document.getElementById('addEventModal').addEventListener('click', function(e) {
            if (e.target === this) closeAddEventModal();
        });

        // ================================================================
        // Moreメニュー
        // ================================================================
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date();
            selectedDate = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
            renderCal(year, month);
            selectDate(selectedDate);

            const moreBtn = document.getElementById('moreMenuBtn');
            const popup = document.getElementById('moreMenuPopup');
            if (moreBtn && popup) {
                moreBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    e.preventDefault();
                    popup.style.display = (popup.style.display === 'none' || popup.style.display === '') ? 'block' : 'none';
                });
                document.addEventListener('click', function(e) {
                    if (popup.style.display === 'block') {
                        if (!e.target.closest('#moreMenuPopup') && !e.target.closest('#moreMenuBtn')) {
                            popup.style.display = 'none';
                        }
                    }
                });
            }

            // フィードバック
            document.getElementById('feedbackMoreBtn').addEventListener('click', function(e) {
                e.preventDefault();
                alert('📝 Feedback feature is under development.\nPlease contact us at tomosche.line@gmail.com');
            });

            // ログアウト
            document.getElementById('logoutMoreBtn').addEventListener('click', function(e) {
                e.preventDefault();
                if (confirm('Logout?')) {
                    if (typeof liff !== 'undefined' && liff.isLoggedIn()) {
                        liff.logout();
                        window.location.reload();
                    } else {
                        window.location.href = '/';
                    }
                }
            });
        });
    </script>
</body>
</html>
