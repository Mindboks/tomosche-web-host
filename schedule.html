<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>スケジュール - Tomosche</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <style>
        .back-btn { background: none; border: none; font-size: 24px; color: #06C755; padding: 0; margin-right: 8px; }
        .page-title { font-size: clamp(1.2rem, 4vw, 1.8rem); font-weight: 600; margin: 0; color: #333; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0 12px 0; }
        .calendar-nav-btn { background: none; border: none; font-size: 24px; color: #06C755; padding: 8px 16px; border-radius: 12px; }
        .calendar-nav-btn:hover { background: #e8f5e9; }
        .calendar-month-year { font-size: clamp(1.1rem, 3vw, 1.6rem); font-weight: 600; color: #333; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: #f0f0f0; border-radius: 16px; overflow: hidden; }
        .calendar-weekday { background: #e8f5e9; color: #2e7d32; font-weight: 600; font-size: clamp(0.7rem, 1.8vw, 0.85rem); text-align: center; padding: 8px 0; }
        .calendar-day {
            background: white;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.85rem, 2vw, 1.1rem);
            font-weight: 500;
            color: #333;
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
        }
        .calendar-day:hover { background: #f5f5f5; }
        .calendar-day.other-month { color: #ccc; }
        .calendar-day.today { background: #e8f5e9; font-weight: 700; color: #06C755; }
        .calendar-day.has-event::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 6px;
            height: 6px;
            background: #06C755;
            border-radius: 50%;
        }
        .calendar-day.selected { background: #06C755; color: white; border-radius: 8px; }

        /* イベントリスト */
        .event-list { margin-top: 16px; background: white; border-radius: 16px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .event-list-title { font-size: 14px; font-weight: 600; color: #666; margin-bottom: 8px; }
        .event-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
        .event-item:last-child { border-bottom: none; }
        .event-time { font-size: 12px; color: #06C755; font-weight: 600; min-width: 60px; }
        .event-title { font-size: 14px; color: #333; margin-left: 12px; flex: 1; }
        .event-person { font-size: 12px; color: #888; margin-left: 8px; background: #f0f0f0; padding: 2px 10px; border-radius: 999px; }
        .event-empty { text-align: center; color: #bbb; font-size: 14px; padding: 16px 0; }

        /* 時間選択モーダル */
        .time-slot { padding: 10px 16px; border: 1px solid #eee; border-radius: 12px; margin: 4px 0; cursor: pointer; transition: all 0.15s; }
        .time-slot:hover { background: #e8f5e9; border-color: #06C755; }
        .time-slot.selected { background: #06C755; color: white; border-color: #06C755; }
        .time-slot-label { font-size: 14px; font-weight: 500; }
        .time-slot-desc { font-size: 12px; color: #888; }
        .time-slot.selected .time-slot-desc { color: rgba(255,255,255,0.8); }

        .add-event-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #06C755;
            color: white;
            border: none;
            font-size: 32px;
            box-shadow: 0 4px 20px rgba(6, 199, 85, 0.4);
            z-index: 100;
            transition: all 0.2s;
        }
        .add-event-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div class="container py-3" style="padding-bottom: 100px;">
        <div class="d-flex align-items-center mb-2">
            <button class="back-btn" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>
            <h1 class="page-title">スケジュール</h1>
        </div>

        <div class="calendar-header">
            <button class="calendar-nav-btn" id="prevMonthBtn"><i class="bi bi-chevron-left"></i></button>
            <span class="calendar-month-year" id="calendarTitle">2026年 6月</span>
            <button class="calendar-nav-btn" id="nextMonthBtn"><i class="bi bi-chevron-right"></i></button>
        </div>

        <div class="calendar-grid" id="calendarGrid"></div>

        <div class="event-list">
            <div class="event-list-title">📋 この日の予定</div>
            <div id="eventListContent"><div class="event-empty">日付を選択してください</div></div>
        </div>
    </div>

    <button class="add-event-btn" id="addEventBtn"><i class="bi bi-plus-lg"></i></button>

    <!-- 時間選択モーダル -->
    <div id="timeModal" style="display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); align-items: center; justify-content: center;">
        <div style="background: white; border-radius: 24px; padding: 28px 24px; max-width: 400px; width: 92%; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h3 style="font-size: 18px; font-weight: 700; color: #333; margin: 0;" id="timeModalTitle">⏰ 時間を選択</h3>
                <button onclick="closeTimeModal()" style="background: none; border: none; font-size: 28px; color: #ccc; cursor: pointer;">×</button>
            </div>
            <p style="font-size: 13px; color: #888; margin-bottom: 12px;" id="timeModalDate">2026年6月23日</p>
            <div id="timeSlotList" style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px;"></div>
            <div style="margin-top: 16px; display: flex; gap: 12px;">
                <button onclick="closeTimeModal()" style="flex: 1; background: #f0f0f0; border: none; padding: 12px; border-radius: 999px; font-size: 14px; font-weight: 600; color: #666; cursor: pointer;">キャンセル</button>
                <button onclick="confirmTimeSelect()" style="flex: 1; background: #06C755; border: none; padding: 12px; border-radius: 999px; font-size: 14px; font-weight: 600; color: white; cursor: pointer;" id="timeConfirmBtn">予定を追加</button>
            </div>
            <div id="timeStatus" style="margin-top: 12px; font-size: 13px; text-align: center; display: none;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        let currentDate = new Date();
        let currentYear = currentDate.getFullYear();
        let currentMonth = currentDate.getMonth();
        let selectedDate = null;
        let selectedTime = null;
        let currentUserName = '';

        // ====== サンプル予定データ（名前付き） ======
        const sampleEvents = {
            '2026-06-23': [
                { time: '09:00', title: '朝のミーティング', person: '田中 一郎' },
                { time: '13:30', title: 'カレンダー共有設定', person: '佐藤 花子' }
            ],
            '2026-06-25': [
                { time: '14:00', title: 'プロジェクト打ち合わせ', person: '鈴木 誠' }
            ],
            '2026-06-28': [
                { time: '10:00', title: '友達とランチ', person: '山田 太郎' },
                { time: '15:45', title: '資料作成', person: '自分' }
            ]
        };

        // ====== 15分刻みの時間スロット生成 ======
        function generateTimeSlots() {
            const slots = [];
            for (let h = 0; h < 24; h++) {
                for (let m = 0; m < 60; m += 15) {
                    const hour = String(h).padStart(2, '0');
                    const min = String(m).padStart(2, '0');
                    slots.push(`${hour}:${min}`);
                }
            }
            return slots;
        }
        const TIME_SLOTS = generateTimeSlots();

        // ====== カレンダー描画 ======
        function renderCalendar(year, month) {
            const grid = document.getElementById('calendarGrid');
            const title = document.getElementById('calendarTitle');
            title.textContent = `${year}年 ${month + 1}月`;

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const prevLastDate = new Date(year, month, 0).getDate();
            const weekdays = ['日', '月', '火', '水', '木', '金', '土'];

            let html = weekdays.map(wd => `<div class="calendar-weekday">${wd}</div>`).join('');

            for (let i = 0; i < firstDay; i++) {
                html += `<div class="calendar-day other-month">${prevLastDate - firstDay + 1 + i}</div>`;
            }

            const today = new Date();
            for (let d = 1; d <= lastDate; d++) {
                const dateObj = new Date(year, month, d);
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isToday = (year === today.getFullYear() && month === today.getMonth() && d === today.getDate());
                const hasEvent = sampleEvents[dateStr] && sampleEvents[dateStr].length > 0;
                const isSelected = (selectedDate === dateStr);

                let classes = 'calendar-day';
                if (isToday) classes += ' today';
                if (hasEvent) classes += ' has-event';
                if (isSelected) classes += ' selected';

                html += `<div class="${classes}" data-date="${dateStr}" data-day="${d}">${d}</div>`;
            }

            const endOffset = (firstDay + lastDate) % 7;
            if (endOffset > 0) {
                for (let i = 1; i <= 7 - endOffset; i++) {
                    html += `<div class="calendar-day other-month">${i}</div>`;
                }
            }

            grid.innerHTML = html;

            grid.querySelectorAll('.calendar-day:not(.other-month)').forEach(el => {
                el.addEventListener('click', function() {
                    selectedDate = this.dataset.date;
                    renderCalendar(year, month);
                    renderEvents(selectedDate);
                });
            });
        }

        // ====== 予定一覧描画（時系列ソート） ======
        function renderEvents(dateStr) {
            const container = document.getElementById('eventListContent');
            const events = (sampleEvents[dateStr] || []).slice().sort((a, b) => a.time.localeCompare(b.time));

            if (events.length === 0) {
                container.innerHTML = `<div class="event-empty">📭 この日の予定はありません</div>`;
                return;
            }

            let html = '';
            events.forEach(e => {
                const personLabel = e.person ? `<span class="event-person">👤 ${e.person}</span>` : '';
                html += `
                    <div class="event-item">
                        <span class="event-time">${e.time}</span>
                        <span class="event-title">${e.title}</span>
                        ${personLabel}
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // ====== 時間選択モーダル ======
        let selectedTimeSlot = null;

        function openTimeModal(dateStr) {
            selectedTimeSlot = null;
            selectedDate = dateStr;
            const dateObj = new Date(dateStr + 'T00:00:00');
            document.getElementById('timeModalTitle').textContent = '⏰ 時間を選択';
            document.getElementById('timeModalDate').textContent = `${dateObj.getFullYear()}年${dateObj.getMonth() + 1}月${dateObj.getDate()}日`;

            const list = document.getElementById('timeSlotList');
            list.innerHTML = '';
            TIME_SLOTS.forEach(time => {
                const div = document.createElement('div');
                div.className = 'time-slot';
                div.innerHTML = `<div class="time-slot-label">${time}</div><div class="time-slot-desc">クリックで選択</div>`;
                div.dataset.time = time;
                div.addEventListener('click', function() {
                    list.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedTimeSlot = time;
                    document.getElementById('timeConfirmBtn').style.opacity = '1';
                    document.getElementById('timeStatus').style.display = 'none';
                });
                list.appendChild(div);
            });

            document.getElementById('timeModal').style.display = 'flex';
            document.getElementById('timeConfirmBtn').style.opacity = '0.5';
            document.getElementById('timeStatus').style.display = 'none';
        }

        function closeTimeModal() {
            document.getElementById('timeModal').style.display = 'none';
        }

        function confirmTimeSelect() {
            const status = document.getElementById('timeStatus');
            if (!selectedTimeSlot) {
                status.style.display = 'block';
                status.style.color = '#e53935';
                status.textContent = '⏰ 時間を選択してください。';
                return;
            }

            // 予定を追加（サンプル）
            const dateStr = selectedDate;
            if (!sampleEvents[dateStr]) sampleEvents[dateStr] = [];
            sampleEvents[dateStr].push({
                time: selectedTimeSlot,
                title: '新しい予定',
                person: currentUserName || '自分'
            });

            status.style.display = 'block';
            status.style.color = '#06C755';
            status.textContent = '✅ 予定を追加しました！';

            setTimeout(() => {
                closeTimeModal();
                renderCalendar(currentYear, currentMonth);
                renderEvents(selectedDate);
            }, 800);
        }

        // ====== イベントリスナー ======
        document.getElementById('prevMonthBtn').addEventListener('click', () => {
            currentMonth--;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar(currentYear, currentMonth);
        });

        document.getElementById('nextMonthBtn').addEventListener('click', () => {
            currentMonth++;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            renderCalendar(currentYear, currentMonth);
        });

        document.getElementById('addEventBtn').addEventListener('click', () => {
            if (!selectedDate) {
                alert('📅 まずカレンダーから日付を選択してください。');
                return;
            }
            openTimeModal(selectedDate);
        });

        document.getElementById('timeModal').addEventListener('click', function(e) {
            if (e.target === this) closeTimeModal();
        });

        // ====== 起動 ======
        document.addEventListener('DOMContentLoaded', async () => {
            const success = await initLiff();
            if (!success) { window.location.href = '/'; return; }
            if (currentUser) currentUserName = currentUser.displayName || '自分';

            const today = new Date();
            selectedDate = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            renderCalendar(currentYear, currentMonth);
            renderEvents(selectedDate);
        });
    </script>
</body>
</html>
