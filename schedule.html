<script src="js/template.js"></script>
<script>
    let year = new Date().getFullYear(), month = new Date().getMonth();
    let selected = null;
    const events = {
        '2026-07-20': [{time:'10:00',title:'田中さんと打ち合わせ',person:'田中 一郎',status:'confirmed'}],
        '2026-07-22': [{time:'09:00',title:'朝会',person:'鈴木 誠',status:'pending'}]
    };

    function renderCal(y,m) {
        const g = document.getElementById('grid');
        const first = new Date(y,m,1).getDay();
        const last = new Date(y,m+1,0).getDate();
        const today = new Date();
        let html = ['日','月','火','水','木','金','土'].map(w=>`<div style="background:#e8f5e9;color:#2e7d32;font-weight:600;font-size:12px;text-align:center;padding:8px 0;">${w}</div>`).join('');
        for (let i=0;i<first;i++) html += `<div style="background:white;aspect-ratio:1;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:14px;">${new Date(y,m,0).getDate()-first+i+1}</div>`;
        for (let d=1; d<=last; d++) {
            const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isToday = y===today.getFullYear() && m===today.getMonth() && d===today.getDate();
            const ev = events[ds] || [];
            const has = ev.length > 0;
            const sel = selected === ds;
            html += `<div onclick="selectDate('${ds}')" style="background:${sel?'#06C755':isToday?'#e8f5e9':'white'};color:${sel?'white':isToday?'#06C755':'#333'};aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:14px;font-weight:${sel||isToday?'700':'500'};cursor:pointer;position:relative;border-radius:${sel?'8px':'0'};">
                ${d}
                ${has ? `<div style="position:absolute;bottom:4px;width:6px;height:6px;border-radius:50%;background:${ev.some(e=>e.status==='pending')?'#ff9800':'#06C755'};"></div>` : ''}
            </div>`;
        }
        document.getElementById('title').textContent = `${y}年 ${m+1}月`;
        g.innerHTML = html;
    }

    function selectDate(ds) {
        selected = ds;
        renderCal(year, month);
        const c = document.getElementById('events');
        const ev = events[ds] || [];
        if (!ev.length) { c.innerHTML = '<div style="text-align:center;color:#bbb;padding:16px 0;">📭 予定はありません</div>'; return; }
        c.innerHTML = ev.map(e => `
            <div style="display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f5f5f5;gap:8px;flex-wrap:wrap;">
                <span style="font-size:12px;font-weight:600;color:${e.status==='confirmed'?'#06C755':'#ff9800'};">${e.time}</span>
                <span style="font-size:14px;color:#333;flex:1;">${e.title}</span>
                <span style="font-size:12px;color:#888;background:#f0f4f8;padding:2px 10px;border-radius:999px;">👤 ${e.person}</span>
                <span style="font-size:10px;padding:2px 8px;border-radius:999px;background:${e.status==='confirmed'?'#e8f5e9':'#fff3e0'};color:${e.status==='confirmed'?'#2e7d32':'#e65100'};">${e.status==='confirmed'?'✅ 確定':'⏳ 承認待ち'}</span>
            </div>
        `).join('');
    }

    const content = `
    <div style="padding:16px 0;">
        <div class="d-flex align-items-center mb-2">
            <button class="back-btn" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>
            <h1 class="page-title">スケジュール</h1>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;">
            <button onclick="month--;if(month<0){month=11;year--;}renderCal(year,month);" style="background:none;border:none;font-size:22px;color:#06C755;padding:8px 12px;"><i class="bi bi-chevron-left"></i></button>
            <span id="title" style="font-size:clamp(1.1rem,3vw,1.4rem);font-weight:600;color:#333;">${year}年 ${month+1}月</span>
            <button onclick="month++;if(month>11){month=0;year++;}renderCal(year,month);" style="background:none;border:none;font-size:22px;color:#06C755;padding:8px 12px;"><i class="bi bi-chevron-right"></i></button>
        </div>
        <div id="grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;background:#f0f4f8;border-radius:16px;overflow:hidden;"></div>
        <div style="margin-top:16px;background:white;border-radius:16px;padding:16px;border:1px solid #f0f4f8;">
            <div style="font-size:14px;font-weight:600;color:#666;margin-bottom:8px;">📋 この日の予定</div>
            <div id="events"><div style="text-align:center;color:#bbb;padding:16px 0;">日付を選択してください</div></div>
        </div>
        <button onclick="alert('📝 予定追加機能は開発中です')" style="position:fixed;bottom:100px;right:24px;width:56px;height:56px;border-radius:50%;background:#06C755;color:white;border:none;font-size:28px;box-shadow:0 4px 20px rgba(6,199,85,0.4);z-index:50;cursor:pointer;"><i class="bi bi-plus-lg"></i></button>
    </div>
    `;

    renderPage('スケジュール', content);
    document.addEventListener('DOMContentLoaded', ()=>{
        const today = new Date();
        selected = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
        renderCal(year, month);
        selectDate(selected);
    });
</script>
