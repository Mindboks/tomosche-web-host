<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Calendar - Tomosche</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-auth-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/app.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="d-flex align-items-center mb-2">
            <button class="back-btn" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>
            <h1 class="page-title">Calendar</h1>
        </div>
        <div class="cal-nav">
            <button id="prevBtn"><i class="bi bi-chevron-left"></i></button>
            <span id="calTitle" style="font-size:clamp(1.1rem,3vw,1.4rem);font-weight:600;color:#333;"></span>
            <button id="nextBtn"><i class="bi bi-chevron-right"></i></button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="event-list">
            <div style="font-size:14px;font-weight:600;color:#666;margin-bottom:8px;">📋 Events for this day</div>
            <div id="eventList"><div class="empty-events">Select a date</div></div>
        </div>
    </div>
    <button class="add-event-btn" onclick="alert('Add event coming soon')"><i class="bi bi-plus-lg"></i></button>

    <div class="bottom-nav">
        <a href="/" class="nav-item"><i class="bi bi-house-fill"></i><span>Home</span></a>
        <a href="friends.html" class="nav-item"><i class="bi bi-people-fill"></i><span>Friends</span></a>
        <a href="schedule.html" class="nav-item active"><i class="bi bi-calendar-event-fill"></i><span>Calendar</span></a>
        <a href="add_friends.html" class="nav-item"><i class="bi bi-person-plus-fill"></i><span>Add</span></a>
        <div class="nav-item" id="moreMenuBtn"><i class="bi bi-grid-fill"></i><span>More</span></div>
    </div>

    <script>
        // ================================================================
        // カレンダーロジック
        // ================================================================
        const events = {
            '2026-07-20': [{ time: '10:00', title: 'Meeting with Tanaka', person: 'Tanaka', status: 'confirmed' }],
            '2026-07-22': [{ time: '09:00', title: 'Morning meeting', person: 'Suzuki', status: 'pending' }]
        };
        let year = new Date().getFullYear(), month = new Date().getMonth(), selected = null;

        function renderCal(y, m) {
            const grid = document.getElementById('calGrid');
            document.getElementById('calTitle').textContent = `${y}年 ${m+1}月`;
            const first = new Date(y, m, 1).getDay();
            const last = new Date(y, m+1, 0).getDate();
            const today = new Date();
            let html = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(w => `<div class="cal-weekday">${w}</div>`).join('');
            for (let i = 0; i < first; i++) {
                html += `<div class="cal-day other">${new Date(y,m,0).getDate()-first+i+1}</div>`;
            }
            for (let d = 1; d <= last; d++) {
                const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isToday = y===today.getFullYear() && m===today.getMonth() && d===today.getDate();
                const ev = events[ds] || [];
                const hasPending = ev.some(e => e.status === 'pending');
                const hasConfirmed = ev.some(e => e.status === 'confirmed');
                const sel = selected === ds;
                let cls = 'cal-day';
                if (isToday) cls += ' today';
                if (sel) cls += ' selected';
                let dot = '';
                if (hasPending) dot += `<div class="dot pending"></div>`;
                if (hasConfirmed) dot += `<div class="dot confirmed"></div>`;
                html += `<div class="${cls}" onclick="selectDate('${ds}')">${d}${dot}</div>`;
            }
            grid.innerHTML = html;
        }

        function selectDate(ds) {
            selected = ds;
            renderCal(year, month);
            const el = document.getElementById('eventList');
            const ev = events[ds] || [];
            if (!ev.length) { el.innerHTML = '<div class="empty-events">📭 No events on this day</div>'; return; }
            el.innerHTML = ev.map(e => `
                <div class="event-item">
                    <span class="event-time ${e.status}">${e.time}</span>
                    <span class="event-title">${e.title}</span>
                    <span class="event-person">👤 ${e.person}</span>
                    <span class="event-badge ${e.status}">${e.status === 'confirmed' ? '✅ Confirmed' : '⏳ Pending'}</span>
                </div>
            `).join('');
        }

        document.getElementById('prevBtn').addEventListener('click', () => { month--; if (month < 0) { month = 11; year--; } renderCal(year, month); });
        document.getElementById('nextBtn').addEventListener('click', () => { month++; if (month > 11) { month = 0; year++; } renderCal(year, month); });

        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date();
            selected = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
            renderCal(year, month);
            selectDate(selected);
        });
    </script>
</body>
</html>
