<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title id="pageTitle">スケジュール - Tomosche</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <style>
        .back-btn { background: none; border: none; font-size: 24px; color: #06C755; padding: 0; margin-right: 8px; }
        .page-title { font-size: clamp(1.2rem, 4vw, 1.8rem); font-weight: 600; margin: 0; color: #333; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0 12px 0; }
        .calendar-nav-btn { background: none; border: none; font-size: 24px; color: #06C755; padding: 8px 16px; border-radius: 12px; }
        .calendar-nav-btn:hover { background: #e8f5e9; }
        .calendar-month-year { font-size: clamp(1.1rem, 3vw, 1.6rem); font-weight: 600; color: #333; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: #f0f0f0; border-radius: 16px; overflow: hidden; }
        .calendar-weekday { background: #e8f5e9; color: #2e7d32; font-weight: 600; font-size: clamp(0.7rem, 1.8vw, 0.85rem); text-align: center; padding: 8px 0; }
        .calendar-day { background: white; aspect-ratio: 1 / 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: clamp(0.85rem, 2vw, 1.1rem); font-weight: 500; color: #333; cursor: pointer; transition: background 0.15s; position: relative; }
        .calendar-day:hover { background: #f5f5f5; }
        .calendar-day.other-month { color: #ccc; }
        .calendar-day.today { background: #e8f5e9; font-weight: 700; color: #06C755; }
        .calendar-day.has-event-pending::after { content: ''; position: absolute; bottom: 4px; width: 6px; height: 6px; background: #ff9800; border-radius: 50%; }
        .calendar-day.has-event-confirmed::after { content: ''; position: absolute; bottom: 4px; width: 8px; height: 8px; background: #06C755; border-radius: 50%; box-shadow: 0 0 4px rgba(6,199,85,0.3); }
        .calendar-day.selected { background: #06C755; color: white; border-radius: 8px; }
        .event-list { margin-top: 16px; background: white; border-radius: 16px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .event-list-title { font-size: 14px; font-weight: 600; color: #666; margin-bottom: 8px; }
        .event-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #f5f5f5; flex-wrap: wrap; gap: 4px 8px; }
        .event-item:last-child { border-bottom: none; }
        .event-time { font-size: 12px; font-weight: 600; }
        .event-time.pending { color: #ff9800; }
        .event-time.confirmed { color: #06C755; }
        .event-title { font-size: 14px; color: #333; flex: 1; min-width: 80px; }
        .event-person { font-size: 12px; color: #888; background: #f0f0f0; padding: 2px 10px; border-radius: 999px; }
        .event-status-badge { font-size: 10px; padding: 2px 8px; border-radius: 999px; }
        .event-status-badge.pending { background: #fff3e0; color: #e65100; }
        .event-status-badge.confirmed { background: #e8f5e9; color: #2e7d32; }
        .event-empty { text-align: center; color: #bbb; font-size: 14px; padding: 16px 0; }
        .modal-overlay { position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; }
        .modal-box { background: white; border-radius: 24px; padding: 28px 24px; max-width: 420px; width: 92%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .modal-box h3 { font-size: 18px; font-weight: 700; color: #333; margin-bottom: 16px; }
        .modal-box label { font-size: 13px; font-weight: 600; color: #555; margin-top: 12px; display: block; }
        .modal-box input, .modal-box select, .modal-box textarea { width: 100%; border: 1px solid #ddd; border-radius: 12px; padding: 12px 14px; font-size: 14px; outline: none; margin-top: 4px; transition: border 0.2s; background: white; }
        .modal-box input:focus, .modal-box select:focus, .modal-box textarea:focus { border-color: #06C755; }
        .modal-box select { appearance: auto; -webkit-appearance: auto; }
        .time-row { display: flex; gap: 12px; }
        .time-row > div { flex: 1; }
        .modal-actions { display: flex; gap: 12px; margin-top: 20px; }
        .modal-actions button { flex: 1; padding: 12px; border-radius: 999px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; }
        .btn-cancel { background: #f0f0f0; color: #666; }
        .btn-cancel:hover { background: #e0e0e0; }
        .btn-primary { background: #06C755; color: white; }
        .btn-primary:hover { background: #049a44; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .add-event-btn { position: fixed; bottom: 24px; right: 24px; width: 60px; height: 60px; border-radius: 50%; background: #06C755; color: white; border: none; font-size: 32px; box-shadow: 0 4px 20px rgba(6,199,85,0.4); z-index: 100; transition: all 0.2s; }
        .add-event-btn:active { transform: scale(0.9); }
        .friend-count-badge { font-size: 11px; color: #999; margin-left: 8px; font-weight: normal; }
    </style>
</head>
<body>
    <div class="container py-3" style="padding-bottom: 100px;">
        <div class="d-flex align-items-center mb-2">
            <button class="back-btn" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>
            <h1 class="page-title" id="scheduleTitle">スケジュール</h1>
        </div>
        <div class="calendar-header">
            <button class="calendar-nav-btn" id="prevMonthBtn"><i class="bi bi-chevron-left"></i></button>
            <span class="calendar-month-year" id="calendarTitle">2026年 6月</span>
            <button class="calendar-nav-btn" id="nextMonthBtn"><i class="bi bi-chevron-right"></i></button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <div class="event-list">
            <div class="event-list-title" id="eventListTitle">📋 この日の予定</div>
            <div id="eventListContent"><div class="event-empty" id="eventEmpty">日付を選択してください</div></div>
        </div>
    </div>
    <button class="add-event-btn" id="addEventBtn"><i class="bi bi-plus-lg"></i></button>

    <!-- 予定追加モーダル -->
    <div class="modal-overlay" id="addEventModal">
        <div class="modal-box">
            <h3 id="newEventTitle">📝 新しい予定</h3>
            <p style="font-size: 13px; color: #888;" id="modalSelectedDate">2026年6月23日</p>
            <label id="selectFriendLabel">👤 友達を選択 <span class="friend-count-badge" id="friendCountBadge"></span></label>
            <select id="friendSelect"><option value="">-- 友達を選択してください --</option></select>
            <label id="eventNameLabel">📌 予定名</label>
            <input type="text" id="eventTitleInput" placeholder="例：ランチ、ミーティング..." />
            <label id="startTimeLabel">⏰ 開始時間</label>
            <input type="time" id="eventStartTimeInput" step="900" />
            <label id="endTimeLabel">⏰ 終了時間</label>
            <input type="time" id="eventEndTimeInput" step="900" />
            <label id="noteLabel">📝 メモ（任意）</label>
            <textarea id="eventNoteInput" rows="2" placeholder="詳細があれば入力してください..."></textarea>
            <div class="modal-actions">
                <button class="btn-cancel" id="modalCancelBtn" onclick="closeAddEventModal()">キャンセル</button>
                <button class="btn-primary" id="confirmAddEventBtn" onclick="confirmAddEvent()" disabled>送信する</button>
            </div>
            <div id="addEventStatus" style="margin-top: 12px; font-size: 13px; text-align: center; display: none;"></div>
        </div>
    </div>

    <!-- 確認ポップアップ -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal-box" style="text-align: center;">
            <div style="font-size: 48px; margin-bottom: 12px;">📨</div>
            <h3 id="confirmModalTitle">予定の確認</h3>
            <p id="confirmModalDesc" style="font-size: 14px; color: #555; margin: 8px 0 16px 0;"></p>
            <div style="display: flex; gap: 12px;">
                <button onclick="closeConfirmModal()" class="btn-cancel" style="flex:1; padding:12px; border-radius:999px; border:none; font-weight:600;" id="confirmNoBtn">キャンセル</button>
                <button onclick="confirmOK()" class="btn-primary" style="flex:1; padding:12px; border-radius:999px; border:none; font-weight:600; color:white;" id="confirmYesBtn">OK</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/i18n.js"></script>
    <script>
        let currentDate = new Date();
        let currentYear = currentDate.getFullYear();
        let currentMonth = currentDate.getMonth();
        let selectedDate = null;
        let currentUserName = '';

        const rawFriends = [
            '青山 隆','赤井 美香','秋山 健太','浅野 裕子','安藤 誠',
            '石井 秀樹','伊藤 真由美','井上 達也','岩崎 千尋','上田 公平',
            '遠藤 翔太','大川 さやか','大野 浩二','岡田 奈々','小川 和也',
            '加藤 彩乃','河野 哲也','木村 直人','工藤 明日香','久保 優子',
            '小林 正明','佐々木 健','佐藤 花子','鈴木 誠','関 健一',
            '高橋 美咲','田中 一郎','谷口 真由','千葉 翔','中村 みな',
            '中山 聖也','西村 好美','野口 大輔','長谷川 陽子','浜田 健吾',
            '林 香織','原田 博之','日高 宏','平野 奈緒','藤田 理沙',
            '古川 正人','細川 裕太','前田 夏美','松本 勇気','三浦 優希',
            '宮崎 綾','村上 真一','森 萌','山田 太郎','渡辺 美咲'
        ];

        let sampleFriends = rawFriends.map((name, index) => ({ id: index + 1, name, initial: name.charAt(0) }));
        let sampleEvents = {};

        function getStatusLabel(status) {
            return status === 'confirmed' ? '✅ 確定' : '⏳ 承認待ち';
        }

        function getStatusClass(status) {
            return status === 'confirmed' ? 'confirmed' : 'pending';
        }

        function renderCalendar(year, month) {
            const grid = document.getElementById('calendarGrid');
            document.getElementById('calendarTitle').textContent = `${year}年 ${month + 1}月`;
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const prevLastDate = new Date(year, month, 0).getDate();
            const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
            let html = weekdays.map(wd => `<div class="calendar-weekday">${wd}</div>`).join('');
            for (let i = 0; i < firstDay; i++) {
                html += `<div class="calendar-day other-month">${prevLastDate - firstDay + 1 + i}</div>`;
            }
            const today = new Date();
            for (let d = 1; d <= lastDate; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isToday = (year === today.getFullYear() && month === today.getMonth() && d === today.getDate());
                const events = sampleEvents[dateStr] || [];
                const hasPending = events.some(e => e.status === 'pending');
                const hasConfirmed = events.some(e => e.status === 'confirmed');
                const isSelected = (selectedDate === dateStr);
                let classes = 'calendar-day';
                if (isToday) classes += ' today';
                if (hasPending) classes += ' has-event-pending';
                if (hasConfirmed) classes += ' has-event-confirmed';
                if (isSelected) classes += ' selected';
                html += `<div class="${classes}" data-date="${dateStr}" data-day="${d}">${d}</div>`;
            }
            const endOffset = (firstDay + lastDate) % 7;
            if (endOffset > 0) {
                for (let i = 1; i <= 7 - endOffset; i++) {
                    html += `<div class="calendar-day other-month">${i}</div>`;
                }
            }
            grid.innerHTML = html;
            grid.querySelectorAll('.calendar-day:not(.other-month)').forEach(el => {
                el.addEventListener('click', function() {
                    selectedDate = this.dataset.date;
                    renderCalendar(year, month);
                    renderEvents(selectedDate);
                });
            });
        }

        function renderEvents(dateStr) {
            const container = document.getElementById('eventListContent');
            const events = (sampleEvents[dateStr] || []).slice().sort((a, b) => a.time.localeCompare(b.time));
            if (events.length === 0) {
                container.innerHTML = `<div class="event-empty" id="eventEmpty">${t('schedule_no_events')}</div>`;
                return;
            }
            let html = '';
            events.forEach(e => {
                const statusClass = getStatusClass(e.status);
                const statusLabel = getStatusLabel(e.status);
                const personLabel = e.person ? `<span class="event-person">👤 ${e.person}</span>` : '';
                const endTime = e.endTime ? `〜 ${e.endTime}` : '';
                html += `
                    <div class="event-item">
                        <span class="event-time ${statusClass}">${e.time} ${endTime}</span>
                        <span class="event-title">${e.title}</span>
                        ${personLabel}
                        <span class="event-status-badge ${statusClass}">${statusLabel}</span>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function updateFriendSelect() {
            const select = document.getElementById('friendSelect');
            const sorted = sortByName(sampleFriends);
            select.innerHTML = `<option value="">${t('schedule_select_placeholder')}</option>`;
            sorted.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.id;
                opt.textContent = f.name;
                select.appendChild(opt);
            });
            document.getElementById('friendCountBadge').textContent = `(${sorted.length}人)`;
        }

        function openAddEventModal() {
            if (!selectedDate) { alert('📅 まずカレンダーから日付を選択してください。'); return; }
            document.getElementById('modalSelectedDate').textContent = selectedDate;
            document.getElementById('eventTitleInput').value = '';
            document.getElementById('eventStartTimeInput').value = '';
            document.getElementById('eventEndTimeInput').value = '';
            document.getElementById('eventNoteInput').value = '';
            document.getElementById('addEventStatus').style.display = 'none';
            document.getElementById('confirmAddEventBtn').disabled = true;
            updateFriendSelect();
            ['friendSelect', 'eventTitleInput', 'eventStartTimeInput', 'eventEndTimeInput'].forEach(id => {
                document.getElementById(id).addEventListener('input', () => {
                    const friend = document.getElementById('friendSelect').value;
                    const title = document.getElementById('eventTitleInput').value.trim();
                    const start = document.getElementById('eventStartTimeInput').value;
                    const end = document.getElementById('eventEndTimeInput').value;
                    document.getElementById('confirmAddEventBtn').disabled = !(friend && title && start && end);
                });
            });
            document.getElementById('addEventModal').style.display = 'flex';
        }

        function closeAddEventModal() {
            document.getElementById('addEventModal').style.display = 'none';
        }

        function confirmAddEvent() {
            const friendId = document.getElementById('friendSelect').value;
            const title = document.getElementById('eventTitleInput').value.trim();
            const startTime = document.getElementById('eventStartTimeInput').value;
            const endTime = document.getElementById('eventEndTimeInput').value;
            const note = document.getElementById('eventNoteInput').value.trim();
            const status = document.getElementById('addEventStatus');
            const friend = sampleFriends.find(f => f.id === parseInt(friendId));
            if (!friend) { status.style.display = 'block'; status.style.color = '#e53935'; status.textContent = '👤 友達を選択してください。'; return; }
            if (!startTime || !endTime) { status.style.display = 'block'; status.style.color = '#e53935'; status.textContent = '⏰ 開始時間と終了時間を両方入力してください。'; return; }
            if (startTime >= endTime) { status.style.display = 'block'; status.style.color = '#e53935'; status.textContent = t('schedule_add_error'); return; }
            if (!sampleEvents[selectedDate]) sampleEvents[selectedDate] = [];
            sampleEvents[selectedDate].push({ time: startTime, endTime, title, person: friend.name, note, status: 'pending' });
            status.style.display = 'block';
            status.style.color = '#06C755';
            status.textContent = t('schedule_add_success', friend.name);
            setTimeout(() => { closeAddEventModal(); renderCalendar(currentYear, currentMonth); renderEvents(selectedDate); }, 1200);
        }

        function openConfirmModal(eventData) {
            document.getElementById('confirmModalTitle').textContent = t('schedule_confirm_title');
            const endLabel = eventData.endTime ? ` 〜 ${eventData.endTime}` : '';
            document.getElementById('confirmModalDesc').textContent =
                t('schedule_confirm_desc', eventData.person, eventData.date, eventData.time, endLabel, eventData.title);
            document.getElementById('confirmModal').style.display = 'flex';
            window._pendingEvent = eventData;
        }

        function closeConfirmModal() {
            document.getElementById('confirmModal').style.display = 'none';
        }

        function confirmOK() {
            const eventData = window._pendingEvent;
            if (eventData) {
                const events = sampleEvents[eventData.date] || [];
                const target = events.find(e =>
                    e.time === eventData.time && e.title === eventData.title && e.person === eventData.person
                );
                if (target) { target.status = 'confirmed'; renderCalendar(currentYear, currentMonth); renderEvents(selectedDate); }
            }
            closeConfirmModal();
            alert(t('schedule_confirm_success'));
        }

        function applyTranslations() {
            document.getElementById('scheduleTitle').textContent = t('schedule_title');
            document.getElementById('eventListTitle').textContent = t('schedule_today_events');
            document.getElementById('eventEmpty').textContent = t('schedule_no_events');
            document.getElementById('newEventTitle').textContent = t('schedule_new_event');
            document.getElementById('selectFriendLabel').innerHTML = `👤 ${t('schedule_select_friend')} <span class="friend-count-badge" id="friendCountBadge"></span>`;
            document.getElementById('eventNameLabel').textContent = t('schedule_event_name');
            document.getElementById('startTimeLabel').textContent = t('schedule_start_time');
            document.getElementById('endTimeLabel').textContent = t('schedule_end_time');
            document.getElementById('noteLabel').textContent = t('schedule_note');
            document.getElementById('modalCancelBtn').textContent = t('schedule_cancel');
            document.getElementById('confirmAddEventBtn').textContent = t('schedule_send');
            document.getElementById('confirmNoBtn').textContent = t('schedule_cancel');
            document.getElementById('confirmYesBtn').textContent = t('schedule_confirm_ok');
            document.title = t('schedule_title') + ' - Tomosche';
        }

        document.getElementById('prevMonthBtn').addEventListener('click', () => { currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; } renderCalendar(currentYear, currentMonth); });
        document.getElementById('nextMonthBtn').addEventListener('click', () => { currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; } renderCalendar(currentYear, currentMonth); });
        document.getElementById('addEventBtn').addEventListener('click', openAddEventModal);
        document.getElementById('addEventModal').addEventListener('click', function(e) { if (e.target === this) closeAddEventModal(); });
        document.getElementById('confirmModal').addEventListener('click', function(e) { if (e.target === this) closeConfirmModal(); });

        document.addEventListener('DOMContentLoaded', async () => {
            applyTranslations();
            const success = await initLiff();
            if (!success) { window.location.href = '/'; return; }
            if (currentUser) currentUserName = currentUser.displayName || '自分';
            const today = new Date();
            selectedDate = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            renderCalendar(currentYear, currentMonth);
            renderEvents(selectedDate);
        });
    </script>
    <div style="text-align: center; padding: 4px 0 16px 0; font-size: 10px; color: #ccc;">Tomosche v0.0.0</div>
</body>
</html>
