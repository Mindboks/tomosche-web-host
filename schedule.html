<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>スケジュール - Tomosche</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <style>
        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: #06C755;
            padding: 0;
            margin-right: 8px;
        }
        .page-title {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 600;
            margin: 0;
            color: #333;
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0 12px 0;
        }
        .calendar-nav-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: #06C755;
            padding: 8px 16px;
            border-radius: 12px;
            transition: background 0.2s;
        }
        .calendar-nav-btn:hover {
            background: #e8f5e9;
        }
        .calendar-nav-btn:active {
            transform: scale(0.92);
        }
        .calendar-month-year {
            font-size: clamp(1.1rem, 3vw, 1.6rem);
            font-weight: 600;
            color: #333;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            background: #f0f0f0;
            border-radius: 16px;
            overflow: hidden;
        }
        .calendar-weekday {
            background: #e8f5e9;
            color: #2e7d32;
            font-weight: 600;
            font-size: clamp(0.7rem, 1.8vw, 0.85rem);
            text-align: center;
            padding: 8px 0;
        }
        .calendar-day {
            background: white;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.85rem, 2vw, 1.1rem);
            font-weight: 500;
            color: #333;
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
        }
        .calendar-day:hover {
            background: #f5f5f5;
        }
        .calendar-day.other-month {
            color: #ccc;
        }
        .calendar-day.today {
            background: #e8f5e9;
            font-weight: 700;
            color: #06C755;
        }
        .calendar-day.has-event::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 6px;
            height: 6px;
            background: #06C755;
            border-radius: 50%;
        }
        .calendar-day:active {
            transform: scale(0.92);
        }

        /* 予定一覧 */
        .event-list {
            margin-top: 16px;
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .event-list-title {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
        }
        .event-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        .event-item:last-child {
            border-bottom: none;
        }
        .event-time {
            font-size: 12px;
            color: #06C755;
            font-weight: 600;
            min-width: 56px;
        }
        .event-title {
            font-size: 14px;
            color: #333;
            margin-left: 12px;
        }
        .event-empty {
            text-align: center;
            color: #bbb;
            font-size: 14px;
            padding: 16px 0;
        }

        /* 新規予定追加ボタン */
        .add-event-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #06C755;
            color: white;
            border: none;
            font-size: 32px;
            box-shadow: 0 4px 20px rgba(6, 199, 85, 0.4);
            transition: all 0.2s;
            z-index: 100;
        }
        .add-event-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 28px rgba(6, 199, 85, 0.5);
        }
        .add-event-btn:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>
    <div class="container py-3" style="padding-bottom: 100px;">
        <!-- ヘッダー -->
        <div class="d-flex align-items-center mb-2">
            <button class="back-btn" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>
            <h1 class="page-title">スケジュール</h1>
        </div>

        <!-- カレンダーナビゲーション -->
        <div class="calendar-header">
            <button class="calendar-nav-btn" id="prevMonthBtn"><i class="bi bi-chevron-left"></i></button>
            <span class="calendar-month-year" id="calendarTitle">2026年 6月</span>
            <button class="calendar-nav-btn" id="nextMonthBtn"><i class="bi bi-chevron-right"></i></button>
        </div>

        <!-- カレンダーグリッド -->
        <div class="calendar-grid" id="calendarGrid">
            <!-- JavaScriptで動的生成 -->
        </div>

        <!-- 予定一覧 -->
        <div class="event-list" id="eventList">
            <div class="event-list-title">📋 この日の予定</div>
            <div id="eventListContent">
                <div class="event-empty">日付を選択してください</div>
            </div>
        </div>
    </div>

    <!-- 予定追加ボタン -->
    <button class="add-event-btn" id="addEventBtn">
        <i class="bi bi-plus-lg"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        // ============================================================
        // カレンダー状態
        // ============================================================
        let currentDate = new Date();
        let selectedDate = null;
        let currentYear = currentDate.getFullYear();
        let currentMonth = currentDate.getMonth();

        // サンプル予定データ（後でFirestoreから取得）
        const sampleEvents = {
            '2026-06-15': [{ time: '10:00', title: '田中さんとカレンダー共有' }],
            '2026-06-20': [{ time: '14:00', title: '佐藤さんと打ち合わせ' }],
            '2026-06-25': [{ time: '09:00', title: '鈴木さんとランチ' }],
        };

        // ============================================================
        // カレンダー生成
        // ============================================================
        function renderCalendar(year, month) {
            const grid = document.getElementById('calendarGrid');
            const title = document.getElementById('calendarTitle');
            
            // タイトル更新
            title.textContent = `${year}年 ${month + 1}月`;

            // 月初の曜日 (0=日曜)
            const firstDay = new Date(year, month, 1).getDay();
            // 月末の日付
            const lastDate = new Date(year, month + 1, 0).getDate();
            // 前月の最終日
            const prevLastDate = new Date(year, month, 0).getDate();

            // 曜日ヘッダー
            const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
            let html = '';
            weekdays.forEach(wd => {
                html += `<div class="calendar-weekday">${wd}</div>`;
            });

            // 空セル（前月分）
            const startOffset = firstDay;
            for (let i = 0; i < startOffset; i++) {
                const day = prevLastDate - startOffset + 1 + i;
                html += `<div class="calendar-day other-month">${day}</div>`;
            }

            // 当月の日付
            const today = new Date();
            const todayDate = today.getDate();
            const todayMonth = today.getMonth();
            const todayYear = today.getFullYear();

            for (let d = 1; d <= lastDate; d++) {
                const dateObj = new Date(year, month, d);
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isToday = (year === todayYear && month === todayMonth && d === todayDate);
                const hasEvent = sampleEvents[dateStr] && sampleEvents[dateStr].length > 0;
                const isSelected = (selectedDate === dateStr);

                let classes = 'calendar-day';
                if (isToday) classes += ' today';
                if (hasEvent) classes += ' has-event';
                if (isSelected) classes += ' selected';

                html += `
                    <div class="${classes}" data-date="${dateStr}" data-day="${d}">
                        ${d}
                    </div>
                `;
            }

            // 翌月の空セル
            const endOffset = (firstDay + lastDate) % 7;
            if (endOffset > 0) {
                for (let i = 1; i <= 7 - endOffset; i++) {
                    html += `<div class="calendar-day other-month">${i}</div>`;
                }
            }

            grid.innerHTML = html;

            // 日付クリックイベント
            grid.querySelectorAll('.calendar-day:not(.other-month)').forEach(el => {
                el.addEventListener('click', function() {
                    const dateStr = this.dataset.date;
                    selectedDate = dateStr;
                    renderCalendar(year, month); // 再描画
                    renderEvents(dateStr);
                });
            });

            // 選択された日付を強調表示（再描画後）
            if (selectedDate) {
                grid.querySelectorAll('.calendar-day').forEach(el => {
                    if (el.dataset.date === selectedDate) {
                        el.style.background = '#06C755';
                        el.style.color = 'white';
                        el.style.borderRadius = '8px';
                    }
                });
            }
        }

        // ============================================================
        // 予定一覧表示
        // ============================================================
        function renderEvents(dateStr) {
            const container = document.getElementById('eventListContent');
            const events = sampleEvents[dateStr] || [];

            if (events.length === 0) {
                container.innerHTML = `
                    <div class="event-empty">
                        <i class="bi bi-calendar-plus" style="font-size: 24px; display: block; margin-bottom: 8px; color: #ddd;"></i>
                        この日の予定はありません
                    </div>
                `;
                return;
            }

            let html = '';
            events.forEach(event => {
                html += `
                    <div class="event-item">
                        <span class="event-time">${event.time}</span>
                        <span class="event-title">${event.title}</span>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // ============================================================
        // ナビゲーション
        // ============================================================
        document.getElementById('prevMonthBtn').addEventListener('click', () => {
            currentMonth--;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar(currentYear, currentMonth);
        });

        document.getElementById('nextMonthBtn').addEventListener('click', () => {
            currentMonth++;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderCalendar(currentYear, currentMonth);
        });

        // ============================================================
        // 予定追加ボタン（仮）
        // ============================================================
        document.getElementById('addEventBtn').addEventListener('click', () => {
            if (!selectedDate) {
                alert('まずカレンダーから日付を選択してください');
                return;
            }
            alert(`📝 予定追加機能（${selectedDate}）\n現在はサンプル表示です。\n後日、DB連携で本実装します。`);
        });

        // ============================================================
        // 起動処理
        // ============================================================
        document.addEventListener('DOMContentLoaded', async () => {
            const success = await initLiff();
            if (!success) {
                window.location.href = '/';
                return;
            }

            // 今日の日付を選択状態に
            const today = new Date();
            selectedDate = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            
            renderCalendar(currentYear, currentMonth);
            renderEvents(selectedDate);
        });
    </script>
</body>
</html>
