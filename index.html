<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Tomosche - Shared Calendar</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- LIFF SDK (LINE連携用) -->
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <!-- 多言語対応 -->
    <script src="js/i18n.js"></script>
    <!-- 共通アプリJS -->
    <script src="js/app.js"></script>
    <style>
        /* ====== スタイル（既存のものを統合） ====== */
        html, body {
            background: #ffffff !important;
            margin: 0 !important;
            padding: 0 !important;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .app-container {
            max-width: 420px;
            margin: 0 auto;
            padding: 0 16px 80px 16px;
            background: #ffffff;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0 8px 0;
        }
        .logo { font-size: 22px; font-weight: 700; color: #06C755; }
        .logo-sub { font-size: 11px; color: #999; font-weight: 400; margin-left: 6px; }
        .profile-icon { font-size: 28px; color: #06C755; cursor: pointer; }
        .image-wrapper {
            position: relative;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin: 4px 0 0 0;
        }
        .image-wrapper img { width: 100%; height: auto; display: block; }
        .image-date {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(6px);
            padding: 6px 18px;
            border-radius: 999px;
            font-size: clamp(11px, 3vw, 14px);
            font-weight: 600;
            color: #333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid rgba(255,255,255,0.6);
            white-space: nowrap;
            z-index: 5;
        }
        .image-search {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: 88%;
            max-width: 360px;
            z-index: 5;
        }
        .image-search .search-box {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(6px);
            border-radius: 12px;
            padding: 10px 16px;
            gap: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            border: 1px solid rgba(255,255,255,0.6);
        }
        .image-search .search-box i { color: #999; font-size: 16px; }
        .image-search .search-box input {
            border: none;
            background: none;
            outline: none;
            flex: 1;
            font-size: clamp(12px, 2.5vw, 14px);
            color: #333;
        }
        .image-search .search-box input::placeholder { color: #bbb; }
        .avatars {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            padding: 12px 0 8px 0;
        }
        .avatar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: #333;
            width: 56px;
        }
        .avatar-circle {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(14px, 2.5vw, 16px);
            font-weight: 600;
            color: #333;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .avatar-add {
            border: 2px dashed #ccc;
            color: #999;
            background: #f0f4f8;
            font-size: 20px;
        }
        .avatar-name {
            font-size: clamp(9px, 2vw, 10px);
            color: #888;
            text-align: center;
            max-width: 56px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .today-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #f0f4f8;
            margin-top: 8px;
        }
        .today-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: clamp(13px, 2.5vw, 14px);
            color: #333;
            margin-bottom: 8px;
        }
        .today-header i { color: #06C755; margin-right: 6px; }
        .today-more {
            font-size: clamp(11px, 2vw, 12px);
            font-weight: 400;
            color: #06C755;
            text-decoration: none;
            white-space: nowrap;
        }
        .today-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f0f4f8;
            gap: 10px;
            font-size: clamp(12px, 2.2vw, 13px);
            white-space: nowrap;
        }
        .today-item:last-child { border-bottom: none; }
        .today-time {
            color: #06C755;
            font-weight: 600;
            min-width: 44px;
            font-size: clamp(11px, 2vw, 12px);
        }
        .today-title {
            flex: 1;
            color: #333;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .today-person {
            color: #888;
            background: #f0f4f8;
            padding: 2px 10px;
            border-radius: 999px;
            font-size: clamp(10px, 1.8vw, 11px);
            white-space: nowrap;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #ffffff;
            display: flex;
            justify-content: space-around;
            padding: 6px 0 14px 0;
            border-top: 1px solid #f0f4f8;
            z-index: 100;
            box-shadow: 0 -2px 12px rgba(0,0,0,0.04);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: clamp(9px, 1.8vw, 10px);
            color: #999;
            text-decoration: none;
            gap: 2px;
            padding: 4px 12px;
            flex: 1;
            max-width: 80px;
            white-space: nowrap;
            cursor: pointer;
        }
        .nav-item i { font-size: 20px; }
        .nav-item.active { color: #06C755; }
        .nav-item.active i { transform: translateY(-2px); }
        .version {
            text-align: center;
            font-size: 10px;
            color: #ccc;
            padding: 8px 0 4px 0;
        }
        .more-popup {
            display: none;
            position: fixed;
            bottom: 76px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.12);
            z-index: 999;
            border: 1px solid #f0f4f8;
            width: 92%;
            max-width: 400px;
        }
        .more-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            text-align: center;
        }
        .more-grid a {
            text-decoration: none;
            color: #333;
            font-size: 12px;
            display: block;
        }
        .more-grid .icon-box {
            background: #f0f4f8;
            border-radius: 14px;
            padding: 14px;
        }
        .more-grid .icon-box i { font-size: 24px; }
        .more-grid span { display: block; margin-top: 4px; }
        .more-close {
            text-align: center;
            margin-top: 12px;
        }
        .more-close button {
            background: none;
            border: none;
            color: #999;
            font-size: 13px;
            padding: 4px 16px;
            cursor: pointer;
        }
        .lang-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #f0f4f8;
        }
        .lang-section .lang-label {
            font-size: 11px;
            color: #888;
            text-align: center;
            margin-bottom: 6px;
        }
        .lang-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
        }
        .lang-btn {
            background: #f0f4f8;
            border: none;
            border-radius: 999px;
            padding: 3px 10px;
            font-size: 10px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lang-btn:hover {
            background: #06C755;
            color: white;
        }
        .lang-btn.active {
            background: #06C755;
            color: white;
        }
        .feedback-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .feedback-box {
            background: white;
            border-radius: 24px;
            padding: 28px 24px;
            max-width: 420px;
            width: 92%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .feedback-box h3 { font-size: 18px; font-weight: 700; color: #333; margin-bottom: 8px; }
        .feedback-box p { font-size: 13px; color: #888; margin-bottom: 16px; }
        .feedback-box textarea {
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 14px;
            outline: none;
            min-height: 100px;
            resize: vertical;
            transition: border 0.2s;
        }
        .feedback-box textarea:focus { border-color: #06C755; }
        .fb-actions { display: flex; gap: 12px; margin-top: 16px; }
        .fb-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }
        .fb-cancel { background: #f0f0f0; color: #666; }
        .fb-cancel:hover { background: #e0e0e0; }
        .fb-send { background: #06C755; color: white; }
        .fb-send:hover { background: #049a44; }
        #fbStatus {
            margin-top: 12px;
            font-size: 13px;
            text-align: center;
            display: none;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .modal-box {
            background: white;
            border-radius: 24px;
            padding: 28px 24px;
            max-width: 420px;
            width: 92%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .modal-box h3 { font-size: 18px; font-weight: 700; color: #333; margin-bottom: 16px; }
        .modal-box label { font-size: 13px; font-weight: 600; color: #555; margin-top: 12px; display: block; }
        .modal-box input, .modal-box select, .modal-box textarea {
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 14px;
            outline: none;
            margin-top: 4px;
            transition: border 0.2s;
            background: white;
        }
        .modal-box input:focus, .modal-box select:focus, .modal-box textarea:focus { border-color: #06C755; }
        .time-row { display: flex; gap: 12px; }
        .time-row > div { flex: 1; }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .modal-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }
        .btn-cancel { background: #f0f0f0; color: #666; }
        .btn-cancel:hover { background: #e0e0e0; }
        .btn-primary { background: #06C755; color: white; }
        .btn-primary:hover { background: #049a44; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .add-event-btn {
            position: fixed;
            bottom: 100px;
            right: 24px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #06C755;
            color: white;
            border: none;
            font-size: 32px;
            box-shadow: 0 4px 20px rgba(6,199,85,0.4);
            z-index: 100;
            cursor: pointer;
        }
        .add-event-btn:active { transform: scale(0.9); }
        @media (max-width: 576px) {
            .app-container { padding: 0 12px 80px 12px; }
            .logo { font-size: 18px; }
            .logo-sub { font-size: 10px; }
            .image-date { font-size: clamp(10px, 2.5vw, 12px); padding: 4px 14px; top: 12px; }
            .image-search .search-box { padding: 8px 12px; }
            .image-search .search-box input { font-size: clamp(11px, 2.2vw, 12px); }
            .avatar-circle { width: 44px; height: 44px; font-size: clamp(12px, 2.2vw, 14px); }
            .avatar-name { font-size: clamp(8px, 1.8vw, 9px); }
            .today-item { font-size: clamp(11px, 2vw, 12px); }
            .today-time { min-width: 36px; font-size: clamp(10px, 1.8vw, 11px); }
            .nav-item { padding: 4px 8px; font-size: clamp(8px, 1.6vw, 9px); }
            .nav-item i { font-size: clamp(16px, 3.5vw, 18px); }
            .modal-box { padding: 20px 16px; }
        }
        @media (min-width: 768px) {
            .bottom-nav { max-width: 420px; left: 50%; transform: translateX(-50%); }
            .more-popup { max-width: 400px; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="logo">🌱 Tomosche <span class="logo-sub">Shared Calendar</span></div>
            <div class="profile-icon" id="profileIcon"><i class="bi bi-person-circle"></i></div>
        </div>
        <div class="image-wrapper">
            <img src="assets/images/toppageTmocha.png" alt="Tomosche" />
            <div class="image-date" id="dateDisplay">Loading...</div>
            <div class="image-search">
                <div class="search-box">
                    <i class="bi bi-search"></i>
                    <input type="text" id="globalSearch" placeholder="Search events or friends..." />
                </div>
            </div>
        </div>
        <div class="avatars" id="avatars"></div>
        <div class="today-card">
            <div class="today-header">
                <span><i class="bi bi-clock-history"></i> Today's Events</span>
                <a href="schedule.html" class="today-more">See All →</a>
            </div>
            <div id="todayList"></div>
        </div>
    </div>
    <div class="version" id="versionDisplay">Tomosche v1.0.0</div>

    <!-- 下部ナビ -->
    <div class="bottom-nav">
        <a href="/" class="nav-item active"><i class="bi bi-house-fill"></i><span>Home</span></a>
        <a href="friends.html" class="nav-item"><i class="bi bi-people-fill"></i><span>Friends</span></a>
        <a href="schedule.html" class="nav-item"><i class="bi bi-calendar-event-fill"></i><span>Calendar</span></a>
        <a href="add_friends.html" class="nav-item"><i class="bi bi-person-plus-fill"></i><span>Add</span></a>
        <div class="nav-item" id="moreMenuBtn"><i class="bi bi-grid-fill"></i><span>More</span></div>
    </div>

    <!-- Moreポップアップ -->
    <div class="more-popup" id="moreMenuPopup">
        <div class="more-grid">
            <a href="guide.html"><div class="icon-box"><i class="bi bi-book" style="color:#6a1b9a;"></i></div><span>Guide</span></a>
            <a href="privacy.html"><div class="icon-box"><i class="bi bi-shield-lock" style="color:#1565c0;"></i></div><span>Privacy</span></a>
            <a href="terms.html"><div class="icon-box"><i class="bi bi-file-text" style="color:#e65100;"></i></div><span>Terms</span></a>
            <a href="#" id="feedbackMoreBtn"><div class="icon-box"><i class="bi bi-chat-dots" style="color:#f9a825;"></i></div><span>Feedback</span></a>
            <a href="#" id="logoutMoreBtn"><div class="icon-box"><i class="bi bi-box-arrow-right" style="color:#e53935;"></i></div><span>Logout</span></a>
        </div>
        <div class="more-close"><button onclick="document.getElementById('moreMenuPopup').style.display='none'">Close</button></div>
        <div class="lang-section">
            <div class="lang-label">Language</div>
            <div class="lang-buttons" id="langButtons">
                <button class="lang-btn" data-lang="ja" onclick="switchLanguage('ja')">日本語</button>
                <button class="lang-btn" data-lang="en" onclick="switchLanguage('en')">English</button>
                <button class="lang-btn" data-lang="zh-CN" onclick="switchLanguage('zh-CN')">中文</button>
                <button class="lang-btn" data-lang="vi" onclick="switchLanguage('vi')">Tiếng Việt</button>
                <button class="lang-btn" data-lang="th" onclick="switchLanguage('th')">ภาษาไทย</button>
                <button class="lang-btn" data-lang="ne" onclick="switchLanguage('ne')">नेपाली</button>
                <button class="lang-btn" data-lang="hi" onclick="switchLanguage('hi')">हिन्दी</button>
                <button class="lang-btn" data-lang="ur" onclick="switchLanguage('ur')">اردو</button>
                <button class="lang-btn" data-lang="bn" onclick="switchLanguage('bn')">বাংলা</button>
                <button class="lang-btn" data-lang="si" onclick="switchLanguage('si')">සිංහල</button>
                <button class="lang-btn" data-lang="my" onclick="switchLanguage('my')">မြန်မာ</button>
                <button class="lang-btn" data-lang="ta" onclick="switchLanguage('ta')">தமிழ்</button>
            </div>
        </div>
    </div>

    <!-- フィードバックモーダル -->
    <div class="feedback-modal" id="feedbackModal">
        <div class="feedback-box">
            <h3>📝 Send Feedback</h3>
            <p>Your feedback helps us improve. We'll get back to you soon.</p>
            <textarea id="fbMessage" placeholder="Write your message here..."></textarea>
            <div class="fb-actions">
                <button class="fb-cancel" onclick="closeFeedback()">Cancel</button>
                <button class="fb-send" id="fbSendBtn" onclick="sendFeedback()">Send</button>
            </div>
            <div id="fbStatus"></div>
        </div>
    </div>

    <!-- 予定追加モーダル -->
    <div class="modal-overlay" id="addEventModal">
        <div class="modal-box">
            <h3>📝 New Event</h3>
            <p style="font-size:13px;color:#888;" id="modalDate">Select a date</p>
            <label>👤 Select a friend</label>
            <select id="friendSelect"><option value="">-- Select a friend --</option></select>
            <label>📌 Event name</label>
            <input type="text" id="eventTitle" placeholder="e.g. Lunch, Meeting..." />
            <div class="time-row">
                <div><label>⏰ Start</label><input type="time" id="eventStart" step="900" /></div>
                <div><label>⏰ End</label><input type="time" id="eventEnd" step="900" /></div>
            </div>
            <label>📝 Note (optional)</label>
            <textarea id="eventNote" rows="2" placeholder="Add details..."></textarea>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeAddEventModal()">Cancel</button>
                <button class="btn-primary" id="confirmAddEventBtn" onclick="confirmAddEvent()" disabled>Submit</button>
            </div>
            <div id="addEventStatus" style="margin-top:12px;font-size:13px;text-align:center;display:none;"></div>
        </div>
    </div>

    <script>
        // ================================================================
        // 日付表示
        // ================================================================
        function updateDateDisplay() {
            const now = new Date();
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const dateEl = document.getElementById('dateDisplay');
            if (dateEl) dateEl.textContent = `${months[now.getMonth()]} ${now.getDate()}, ${hh}:${mm}`;
        }

        // ================================================================
        // 言語切替
        // ================================================================
        function switchLanguage(lang) {
            if (lang && SUPPORTED_LANGS.includes(lang)) {
                localStorage.setItem('tomosche_lang', lang);
                location.reload();
            }
        }

        // ================================================================
        // 友達アイコン
        // ================================================================
        function renderFriends() {
            const friends = [
                { name: 'Tanaka', initial: '田', color: '#e3f2fd' },
                { name: 'Sato', initial: '佐', color: '#e8f5e9' },
                { name: 'Suzuki', initial: '鈴', color: '#fff3e0' },
                { name: 'Yamada', initial: '山', color: '#fce4ec' }
            ];
            const container = document.getElementById('avatars');
            container.innerHTML = '';
            friends.forEach(f => {
                const div = document.createElement('div');
                div.className = 'avatar-item';
                div.innerHTML = `<div class="avatar-circle" style="background:${f.color};">${f.initial}</div><span class="avatar-name">${f.name}</span>`;
                container.appendChild(div);
            });
            const addDiv = document.createElement('a');
            addDiv.href = 'add_friends.html';
            addDiv.className = 'avatar-item';
            addDiv.innerHTML = `<div class="avatar-circle avatar-add"><i class="bi bi-plus"></i></div><span class="avatar-name">Add</span>`;
            container.appendChild(addDiv);
        }

        // ================================================================
        // 今日の予定
        // ================================================================
        function renderTodayEvents() {
            const events = [
                { time: '10:00', title: 'Meeting with Tanaka', person: 'Tanaka' },
                { time: '14:00', title: 'Calendar sharing setup', person: 'Sato' }
            ];
            const container = document.getElementById('todayList');
            container.innerHTML = '';
            events.forEach(e => {
                const div = document.createElement('div');
                div.className = 'today-item';
                div.innerHTML = `<span class="today-time">${e.time}</span><span class="today-title">${e.title}</span><span class="today-person">👤 ${e.person}</span>`;
                container.appendChild(div);
            });
        }

        // ================================================================
        // フィードバック
        // ================================================================
        function openFeedback() {
            document.getElementById('feedbackModal').style.display = 'flex';
            document.getElementById('fbMessage').value = '';
            document.getElementById('fbStatus').style.display = 'none';
            document.getElementById('fbSendBtn').disabled = false;
        }
        function closeFeedback() {
            document.getElementById('feedbackModal').style.display = 'none';
        }
        function sendFeedback() {
            const msg = document.getElementById('fbMessage').value.trim();
            const status = document.getElementById('fbStatus');
            if (!msg) {
                status.style.display = 'block';
                status.style.color = '#e53935';
                status.textContent = 'Please enter a message.';
                return;
            }
            if (msg.length < 5) {
                status.style.display = 'block';
                status.style.color = '#e53935';
                status.textContent = 'Please provide more details (at least 5 characters).';
                return;
            }
            const subject = encodeURIComponent('Tomosche Feedback');
            const body = encodeURIComponent(msg + '\n\n---\nSent from Tomosche app');
            window.location.href = `mailto:tomosche.line@gmail.com?subject=${subject}&body=${body}`;
            status.style.display = 'block';
            status.style.color = '#06C755';
            status.textContent = '✅ Thank you! Your feedback has been sent.';
            setTimeout(closeFeedback, 2000);
        }

        // ================================================================
        // 予定追加
        // ================================================================
        function openAddEventModal(dateStr) {
            document.getElementById('modalDate').textContent = dateStr || 'No events';
            document.getElementById('addEventModal').style.display = 'flex';
            document.getElementById('confirmAddEventBtn').disabled = true;
            document.getElementById('addEventStatus').style.display = 'none';
        }
        function closeAddEventModal() {
            document.getElementById('addEventModal').style.display = 'none';
        }
        function checkAddEventForm() {
            const title = document.getElementById('eventTitle').value.trim();
            const start = document.getElementById('eventStart').value;
            const end = document.getElementById('eventEnd').value;
            const friend = document.getElementById('friendSelect').value;
            document.getElementById('confirmAddEventBtn').disabled = !(title && start && end && friend);
        }
        function confirmAddEvent() {
            const title = document.getElementById('eventTitle').value.trim();
            const start = document.getElementById('eventStart').value;
            const end = document.getElementById('eventEnd').value;
            const friend = document.getElementById('friendSelect').value;
            const status = document.getElementById('addEventStatus');
            if (!title || !start || !end || !friend) {
                status.style.display = 'block';
                status.style.color = '#e53935';
                status.textContent = 'Please fill in all fields.';
                return;
            }
            if (start >= end) {
                status.style.display = 'block';
                status.style.color = '#e53935';
                status.textContent = '⚠️ End time must be after start time.';
                return;
            }
            status.style.display = 'block';
            status.style.color = '#06C755';
            status.textContent = '✅ Event added!';
            setTimeout(closeAddEventModal, 1500);
        }

        // ================================================================
        // 起動処理
        // ================================================================
        document.addEventListener('DOMContentLoaded', function() {
            updateDateDisplay();
            renderFriends();
            renderTodayEvents();

            // Moreメニュー
            const moreBtn = document.getElementById('moreMenuBtn');
            const popup = document.getElementById('moreMenuPopup');
            if (moreBtn && popup) {
                moreBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    e.preventDefault();
                    popup.style.display = (popup.style.display === 'none' || popup.style.display === '') ? 'block' : 'none';
                });
                document.addEventListener('click', function(e) {
                    if (popup.style.display === 'block') {
                        if (!e.target.closest('#moreMenuPopup') && !e.target.closest('#moreMenuBtn')) {
                            popup.style.display = 'none';
                        }
                    }
                });
            }

            // フィードバック
            document.getElementById('feedbackMoreBtn').addEventListener('click', function(e) {
                e.preventDefault();
                openFeedback();
            });

            // ログアウト
            document.getElementById('logoutMoreBtn').addEventListener('click', function(e) {
                e.preventDefault();
                if (confirm('Logout?')) {
                    if (typeof liff !== 'undefined' && liff.isLoggedIn()) {
                        liff.logout();
                        window.location.reload();
                    } else {
                        window.location.href = '/';
                    }
                }
            });

            // 検索
            document.getElementById('globalSearch').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const q = this.value.trim();
                    if (q) alert('🔍 "' + q + '"');
                }
            });

            // モーダル
            document.getElementById('addEventModal').addEventListener('click', function(e) {
                if (e.target === this) closeAddEventModal();
            });
            document.getElementById('feedbackModal').addEventListener('click', function(e) {
                if (e.target === this) closeFeedback();
            });

            // 入力チェック
            ['eventTitle', 'eventStart', 'eventEnd'].forEach(id => {
                document.getElementById(id).addEventListener('input', checkAddEventForm);
            });
            document.getElementById('friendSelect').addEventListener('change', checkAddEventForm);

            // LIFF初期化            (async function() {
                try {
                    await liff.init({ liffId: '2010384200-BS1cr2CR' });
                    if (!liff.isLoggedIn()) {
                        liff.login();
                        return;
                    }
                    const profile = await liff.getProfile();
                    console.log('Logged in:', profile.displayName);
                } catch (e) {
                    console.error('LIFF error:', e);
                }
            })();
        });
    </script>
</body>
</html>
