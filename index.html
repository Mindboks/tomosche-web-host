<script src="js/template.js"></script>
<script>
    // ====== 今日の日付 ======
    const today = new Date();
    const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 
                        'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    const dateStr = `Today・${monthNames[today.getMonth()]} ${today.getDate()}`;

    // ====== サンプル友達 ======
    const sampleFriends = [
        { name: '田中', initial: '田', color: '#e3f2fd' },
        { name: '佐藤', initial: '佐', color: '#e8f5e9' },
        { name: '鈴木', initial: '鈴', color: '#fff3e0' },
        { name: '山田', initial: '山', color: '#fce4ec' }
    ];

    // ====== 今日の予定 ======
    const todayEvents = [
        { time: '10:00', title: '田中さんと打ち合わせ', person: '田中' },
        { time: '14:00', title: 'カレンダー共有設定', person: '佐藤' }
    ];

    // ====== コンテンツ ======
    const content = `
    <!-- メイン画像 -->
    <div class="main-image-wrapper" style="display:flex; justify-content:center; padding:4px 16px 8px 16px;">
        <div style="position:relative; width:100%; max-width:420px; border-radius:20px; overflow:hidden; background:#ffffff; box-shadow:0 2px 12px rgba(0,0,0,0.06);">
            <img src="assets/images/toppageTmocha.png" alt="Tomosche" style="width:100%; height:auto; display:block;" />
            <div style="position:absolute; top:16px; left:50%; transform:translateX(-50%); background:rgba(255,255,255,0.92); backdrop-filter:blur(6px); padding:6px 18px; border-radius:999px; font-size:14px; font-weight:600; color:#333; box-shadow:0 2px 8px rgba(0,0,0,0.04); border:1px solid rgba(255,255,255,0.6); white-space:nowrap;">${dateStr}</div>
            <div style="position:absolute; bottom:16px; left:50%; transform:translateX(-50%); width:88%; max-width:360px;">
                <div style="display:flex; align-items:center; background:rgba(255,255,255,0.95); backdrop-filter:blur(6px); border-radius:12px; padding:10px 16px; gap:10px; box-shadow:0 2px 12px rgba(0,0,0,0.06); border:1px solid rgba(255,255,255,0.6);">
                    <i class="bi bi-search" style="color:#999; font-size:16px;"></i>
                    <input type="text" id="globalSearch" placeholder="Search events, friends, or dates..." style="border:none; background:none; outline:none; flex:1; font-size:13px; color:#333;" />
                </div>
            </div>
        </div>
    </div>

    <!-- 友達アイコン -->
    <div style="display:flex; gap:12px; padding:8px 16px 16px 16px; background:#ffffff; flex-wrap:wrap;">
        ${sampleFriends.map(f => `
            <div style="display:flex; flex-direction:column; align-items:center; gap:4px;">
                <div style="width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:600; color:#333; border:2px solid white; box-shadow:0 2px 8px rgba(0,0,0,0.06); background:${f.color};">${f.initial}</div>
                <span style="font-size:10px; color:#888; text-align:center;">${f.name}</span>
            </div>
        `).join('')}
        <a href="add_friends.html" style="display:flex; flex-direction:column; align-items:center; gap:4px; text-decoration:none;">
            <div style="width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; color:#999; border:2px dashed #ccc; box-shadow:0 2px 8px rgba(0,0,0,0.06); background:#f0f4f8 !important;"><i class="bi bi-plus"></i></div>
            <span style="font-size:10px; color:#888; text-align:center;">Add</span>
        </a>
    </div>

    <!-- 今日の予定 -->
    <div style="background:#ffffff; margin:0 16px 16px 16px; border-radius:16px; padding:16px; border:1px solid #f0f4f8;">
        <div style="display:flex; justify-content:space-between; align-items:center; font-size:14px; font-weight:600; color:#333; margin-bottom:10px;">
            <span><i class="bi bi-clock-history" style="color:#06C755; margin-right:6px;"></i> Upcoming</span>
            <a href="schedule.html" style="font-size:12px; font-weight:400; color:#06C755; text-decoration:none;">See All →</a>
        </div>
        ${todayEvents.map(e => `
            <div style="display:flex; align-items:center; padding:8px 0; border-bottom:1px solid #f0f4f8; gap:10px;">
                <span style="font-size:12px; font-weight:600; color:#06C755; min-width:44px;">${e.time}</span>
                <span style="font-size:13px; color:#333; flex:1;">${e.title}</span>
                <span style="font-size:11px; color:#888; background:#f0f4f8; padding:2px 10px; border-radius:999px;">👤 ${e.person}</span>
            </div>
        `).join('')}
    </div>
    `;

    // ====== レンダリング ======
    renderPage('友助 - トップ', content, 'home');

    // ====== ページロード後 ======
    afterPageLoad(function() {
        // 検索機能
        document.getElementById('globalSearch').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const query = this.value.trim();
                if (query) alert(`🔍 「${query}」を検索します（機能は開発中です）`);
            }
        });
    });
</script>
