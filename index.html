<script src="js/template.js"></script>
<script>
    // ====== 今日の日付（英語表記） ======
    const today = new Date();
    const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 
                        'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    const dateStr = `Today・${monthNames[today.getMonth()]} ${today.getDate()}`;

    // ====== サンプル友達 ======
    const sampleFriends = [
        { name: '田中 一郎', initial: '田', color: '#e3f2fd' },
        { name: '佐藤 花子', initial: '佐', color: '#e8f5e9' },
        { name: '鈴木 誠', initial: '鈴', color: '#fff3e0' },
        { name: '山田 太郎', initial: '山', color: '#fce4ec' }
    ];

    // ====== 今日の予定（サンプル） ======
    const todayEvents = [
        { time: '10:00', title: '田中さんと打ち合わせ', person: '田中' },
        { time: '14:00', title: 'カレンダー共有設定', person: '佐藤' }
    ];

    // ====== コンテンツ ======
    const content = `
    <!-- ====== ヘッダー（ロゴ＋日付） ====== -->
    <div class="header-section">
        <div class="header-left">
            <span class="logo-icon">🌱</span>
            <span class="logo-title">Tomosche</span>
            <span class="logo-sub">友助</span>
        </div>
        <div class="header-right">
            <span class="header-date">${dateStr}</span>
            <div class="profile-icon" id="profileIcon">
                <i class="bi bi-person-circle"></i>
            </div>
        </div>
    </div>

    <!-- ====== メイン画像（中央配置） ====== -->
    <div class="main-image-wrapper">
        <img src="assets/images/toppageTmocha.png" alt="Tomosche" class="main-image" />
    </div>

    <!-- ====== 検索窓（画像の下） ====== -->
    <div class="search-section">
        <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text" id="globalSearch" placeholder="Search events, friends, or dates..." />
        </div>
    </div>

    <!-- ====== 友達アイコン（4人） ====== -->
    <div class="friends-avatars">
        <div class="avatars-row">
            ${sampleFriends.map((f, i) => `
                <div class="avatar-item">
                    <div class="avatar-circle" style="background: ${f.color};">
                        ${f.initial}
                    </div>
                    <span class="avatar-name">${f.name}</span>
                </div>
            `).join('')}
        </div>
        <a href="friends.html" class="avatars-more">
            <div class="avatar-circle more-circle">
                <i class="bi bi-plus"></i>
            </div>
            <span class="avatar-name">追加</span>
        </a>
    </div>

    <!-- ====== 今日の予定 ====== -->
    <div class="today-section">
        <div class="today-header">
            <span><i class="bi bi-clock-history"></i> Upcoming</span>
            <a href="schedule.html" class="today-more">See All →</a>
        </div>
        <div class="today-list">
            ${todayEvents.map(e => `
                <div class="today-item">
                    <span class="today-time">${e.time}</span>
                    <span class="today-title">${e.title}</span>
                    <span class="today-person">👤 ${e.person}</span>
                </div>
            `).join('')}
        </div>
    </div>

    <!-- ====== 下部ナビゲーションメニュー ====== -->
    <div class="bottom-nav">
        <a href="/" class="nav-item active">
            <i class="bi bi-house-fill"></i>
            <span>Home</span>
        </a>
        <a href="friends.html" class="nav-item">
            <i class="bi bi-people-fill"></i>
            <span>Friends</span>
        </a>
        <a href="schedule.html" class="nav-item">
            <i class="bi bi-calendar-event-fill"></i>
            <span>Calendar</span>
        </a>
        <a href="add_friends.html" class="nav-item">
            <i class="bi bi-person-plus-fill"></i>
            <span>Add</span>
        </a>
        <div class="nav-item" id="moreMenuBtn">
            <i class="bi bi-grid-fill"></i>
            <span>More</span>
        </div>
    </div>

    <!-- ====== モアメニューポップアップ ====== -->
    <div id="moreMenuPopup" style="display: none; position: fixed; bottom: 80px; left: 20px; right: 20px; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 8px 40px rgba(0,0,0,0.15); z-index: 999;">
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; text-align: center;">
            <a href="guide.html" style="text-decoration: none; color: #333; font-size: 13px;">
                <div style="background: #f0f0f0; border-radius: 12px; padding: 12px;">
                    <i class="bi bi-book" style="font-size: 24px; color: #6a1b9a;"></i>
                </div>
                <span>使い方</span>
            </a>
            <a href="privacy.html" style="text-decoration: none; color: #333; font-size: 13px;">
                <div style="background: #f0f0f0; border-radius: 12px; padding: 12px;">
                    <i class="bi bi-shield-lock" style="font-size: 24px; color: #1565c0;"></i>
                </div>
                <span>プライバシー</span>
            </a>
            <a href="terms.html" style="text-decoration: none; color: #333; font-size: 13px;">
                <div style="background: #f0f0f0; border-radius: 12px; padding: 12px;">
                    <i class="bi bi-file-text" style="font-size: 24px; color: #e65100;"></i>
                </div>
                <span>利用規約</span>
            </a>
            <a href="#" id="feedbackMoreBtn" style="text-decoration: none; color: #333; font-size: 13px;">
                <div style="background: #f0f0f0; border-radius: 12px; padding: 12px;">
                    <i class="bi bi-chat-dots" style="font-size: 24px; color: #f9a825;"></i>
                </div>
                <span>フィードバック</span>
            </a>
            <a href="#" id="logoutMoreBtn" style="text-decoration: none; color: #333; font-size: 13px;">
                <div style="background: #f0f0f0; border-radius: 12px; padding: 12px;">
                    <i class="bi bi-box-arrow-right" style="font-size: 24px; color: #e53935;"></i>
                </div>
                <span>ログアウト</span>
            </a>
        </div>
        <div style="text-align: center; margin-top: 12px;">
            <button onclick="document.getElementById('moreMenuPopup').style.display='none'" style="background: none; border: none; color: #999; font-size: 14px;">閉じる</button>
        </div>
    </div>
    `;

    // ====== レンダリング ======
    renderPage('友助 - トップ', content, `
        <style>
            /* ====== ベース ====== */
            body {
                background: linear-gradient(180deg, #f0f4f8 0%, #e8ecf0 100%);
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                padding-bottom: 80px;
                min-height: 100vh;
            }

            /* ====== ヘッダー ====== */
            .header-section {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 16px 20px 8px 20px;
                background: transparent;
            }
            .header-left {
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .logo-icon { font-size: 28px; }
            .logo-title {
                font-size: 20px;
                font-weight: 700;
                color: #06C755;
            }
            .logo-sub {
                font-size: 11px;
                color: #888;
                background: rgba(255,255,255,0.6);
                padding: 2px 8px;
                border-radius: 999px;
                margin-left: 4px;
                backdrop-filter: blur(4px);
            }
            .header-right {
                display: flex;
                align-items: center;
                gap: 12px;
            }
            .header-date {
                font-size: 14px;
                font-weight: 600;
                color: #333;
            }
            .profile-icon {
                font-size: 32px;
                color: #06C755;
                cursor: pointer;
            }

            /* ====== メイン画像 ====== */
            .main-image-wrapper {
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 8px 20px 12px 20px;
            }
            .main-image {
                max-width: 100%;
                height: auto;
                max-height: 420px;
                border-radius: 20px;
                box-shadow: 0 8px 32px rgba(0,0,0,0.08);
                object-fit: contain;
                background: white;
            }

            /* ====== 検索窓 ====== */
            .search-section {
                padding: 0 20px 16px 20px;
            }
            .search-box {
                display: flex;
                align-items: center;
                background: white;
                border-radius: 12px;
                padding: 12px 16px;
                gap: 10px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.04);
                border: 1px solid #e8ecf0;
            }
            .search-box i {
                color: #999;
                font-size: 18px;
            }
            .search-box input {
                border: none;
                background: none;
                outline: none;
                flex: 1;
                font-size: 15px;
                color: #333;
            }
            .search-box input::placeholder {
                color: #bbb;
            }

            /* ====== 友達アイコン ====== */
            .friends-avatars {
                padding: 0 20px 16px 20px;
                display: flex;
                align-items: center;
                flex-wrap: wrap;
                gap: 12px;
            }
            .avatars-row {
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
            }
            .avatar-item, .avatars-more {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 4px;
                text-decoration: none;
                color: #333;
            }
            .avatar-circle {
                width: 56px;
                height: 56px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
                font-weight: 600;
                color: #333;
                border: 2px solid white;
                box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            }
            .more-circle {
                background: rgba(255,255,255,0.8) !important;
                border: 2px dashed #ccc;
                color: #999;
                font-size: 20px;
            }
            .avatar-name {
                font-size: 11px;
                color: #888;
                max-width: 56px;
                text-overflow: ellipsis;
                overflow: hidden;
                white-space: nowrap;
                text-align: center;
            }

            /* ====== 今日の予定 ====== */
            .today-section {
                background: rgba(255,255,255,0.85);
                backdrop-filter: blur(8px);
                margin: 0 20px 16px 20px;
                border-radius: 16px;
                padding: 16px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.04);
                border: 1px solid rgba(255,255,255,0.6);
            }
            .today-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 15px;
                font-weight: 600;
                color: #333;
                margin-bottom: 12px;
            }
            .today-header i { color: #06C755; margin-right: 6px; }
            .today-more {
                font-size: 13px;
                font-weight: 400;
                color: #06C755;
                text-decoration: none;
            }
            .today-item {
                display: flex;
                align-items: center;
                padding: 10px 0;
                border-bottom: 1px solid rgba(0,0,0,0.05);
                gap: 10px;
            }
            .today-item:last-child { border-bottom: none; }
            .today-time {
                font-size: 13px;
                font-weight: 600;
                color: #06C755;
                min-width: 48px;
            }
            .today-title {
                font-size: 14px;
                color: #333;
                flex: 1;
            }
            .today-person {
                font-size: 12px;
                color: #888;
                background: rgba(0,0,0,0.05);
                padding: 2px 10px;
                border-radius: 999px;
            }

            /* ====== 下部ナビゲーション ====== */
            .bottom-nav {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: rgba(255,255,255,0.92);
                backdrop-filter: blur(12px);
                display: flex;
                justify-content: space-around;
                align-items: center;
                padding: 8px 12px 16px 12px;
                border-top: 1px solid rgba(0,0,0,0.05);
                box-shadow: 0 -2px 12px rgba(0,0,0,0.04);
                z-index: 100;
            }
            .nav-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 2px;
                text-decoration: none;
                color: #999;
                font-size: 11px;
                cursor: pointer;
                background: none;
                border: none;
                padding: 4px 12px;
            }
            .nav-item i {
                font-size: 22px;
                transition: all 0.2s;
            }
            .nav-item.active {
                color: #06C755;
            }
            .nav-item.active i {
                transform: translateY(-2px);
            }
            .nav-item:active {
                transform: scale(0.92);
            }

            /* ====== ダークモード ====== */
            @media (prefers-color-scheme: dark) {
                body {
                    background: linear-gradient(180deg, #0d0d1a 0%, #1a1a2e 100%);
                }
                .search-box {
                    background: rgba(26,26,46,0.8);
                    border-color: rgba(255,255,255,0.08);
                }
                .search-box input {
                    color: #eee;
                }
                .search-box input::placeholder {
                    color: #666;
                }
                .today-section {
                    background: rgba(26,26,46,0.85);
                    border-color: rgba(255,255,255,0.05);
                }
                .today-header {
                    color: #eee;
                }
                .today-item {
                    border-color: rgba(255,255,255,0.05);
                }
                .today-title {
                    color: #eee;
                }
                .bottom-nav {
                    background: rgba(26,26,46,0.92);
                    border-color: rgba(255,255,255,0.05);
                }
                .header-date {
                    color: #ccc;
                }
                .logo-sub {
                    background: rgba(255,255,255,0.08);
                    color: #888;
                }
                #moreMenuPopup {
                    background: #1a1a2e;
                }
                #moreMenuPopup a {
                    color: #eee !important;
                }
                .avatar-name {
                    color: #aaa;
                }
                .today-person {
                    background: rgba(255,255,255,0.08);
                    color: #aaa;
                }
                .main-image {
                    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
                }
            }
        </style>
    `);

    // ====== ページロード後の処理 ======
    afterPageLoad(function() {
        // プロフィールアイコンクリック
        document.getElementById('profileIcon').addEventListener('click', function() {
            const popup = document.getElementById('moreMenuPopup');
            popup.style.display = (popup.style.display === 'none') ? 'block' : 'none';
        });

        // モアメニューボタン
        document.getElementById('moreMenuBtn').addEventListener('click', function() {
            const popup = document.getElementById('moreMenuPopup');
            popup.style.display = (popup.style.display === 'none') ? 'block' : 'none';
        });

        // ログアウト
        document.getElementById('logoutMoreBtn').addEventListener('click', function(e) {
            e.preventDefault();
            if (confirm('ログアウトしますか？')) {
                logout();
            }
        });

        // フィードバック
        document.getElementById('feedbackMoreBtn').addEventListener('click', function(e) {
            e.preventDefault();
            if (window.openFeedback) {
                window.openFeedback();
            } else {
                alert('📝 フィードバック機能は準備中です。\n代わりに tomosche.line@gmail.com へご連絡ください。');
            }
        });

        // 検索（ダミー）
        document.getElementById('globalSearch').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const query = this.value.trim();
                if (query) {
                    alert(`🔍 「${query}」を検索します（機能は開発中です）`);
                }
            }
        });

        // 背景クリックでポップアップを閉じる
        document.addEventListener('click', function(e) {
            const popup = document.getElementById('moreMenuPopup');
            if (popup.style.display === 'block') {
                if (!e.target.closest('#moreMenuPopup') && 
                    !e.target.closest('#moreMenuBtn') && 
                    !e.target.closest('#profileIcon')) {
                    popup.style.display = 'none';
                }
            }
        });
    });
</script>
