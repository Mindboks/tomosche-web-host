<script src="js/template.js"></script>
<script>
    // ====== 今日の日付 ======
    const today = new Date();
    const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 
                        'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    const dateStr = `Today·${monthNames[today.getMonth()]} ${today.getDate()}`;

    // ====== サンプル友達 ======
    const sampleFriends = [
        { name: '田中 一郎', initial: '田', color: '#e3f2fd' },
        { name: '佐藤 花子', initial: '佐', color: '#e8f5e9' },
        { name: '鈴木 誠', initial: '鈴', color: '#fff3e0' },
        { name: '山田 太郎', initial: '山', color: '#fce4ec' }
    ];

    // ====== 今日の予定（サンプル） ======
    const todayEvents = [
        { time: '10:00', title: '田中さんと打ち合わせ', person: '田中' },
        { time: '14:00', title: 'カレンダー共有設定', person: '佐藤' }
    ];

    // ====== コンテンツ ======
    const content = `
    <!-- ====== ヘッダー ====== -->
    <div class="header-section">
        <div class="header-left">
            <span class="logo-icon">🌱</span>
            <span class="logo-title">Tomosche</span>
            <span class="logo-sub">友助</span>
        </div>
        <div class="header-right">
            <div class="profile-icon" id="profileIcon">
                <i class="bi bi-person-circle"></i>
            </div>
        </div>
    </div>

    <!-- ====== メイン画像（日付：上／検索窓：下部に重ねる） ====== -->
    <div class="main-image-wrapper">
        <div class="main-image-container">
            <img src="assets/images/toppageTmocha.png" alt="Tomosche" class="main-image" />
            <!-- 日付（上に重ねる） -->
            <div class="image-date">${dateStr}</div>
            <!-- 検索窓（下部に重ねる） -->
            <div class="image-search">
                <div class="search-box">
                    <i class="bi bi-search"></i>
                    <input type="text" id="globalSearch" placeholder="Search events, friends, or dates..." />
                </div>
            </div>
        </div>
    </div>

    <!-- ====== 友達アイコン（4人） ====== -->
    <div class="friends-avatars">
        <div class="avatars-row">
            ${sampleFriends.map((f, i) => `
                <div class="avatar-item">
                    <div class="avatar-circle" style="background: ${f.color};">
                        ${f.initial}
                    </div>
                    <span class="avatar-name">${f.name}</span>
                </div>
            `).join('')}
        </div>
        <a href="friends.html" class="avatars-more">
            <div class="avatar-circle more-circle">
                <i class="bi bi-plus"></i>
            </div>
            <span class="avatar-name">Add</span>
        </a>
    </div>

    <!-- ====== 今日の予定 ====== -->
    <div class="today-section">
        <div class="today-header">
            <span><i class="bi bi-clock-history"></i> Upcoming</span>
            <a href="schedule.html" class="today-more">See All →</a>
        </div>
        <div class="today-list">
            ${todayEvents.map(e => `
                <div class="today-item">
                    <span class="today-time">${e.time}</span>
                    <span class="today-title">${e.title}</span>
                    <span class="today-person">👤 ${e.person}</span>
                </div>
            `).join('')}
        </div>
    </div>

    <!-- ====== 下部ナビゲーション ====== -->
    <div class="bottom-nav">
        <a href="/" class="nav-item active">
            <i class="bi bi-house-fill"></i>
            <span>Home</span>
        </a>
        <a href="friends.html" class="nav-item">
            <i class="bi bi-people-fill"></i>
            <span>Friends</span>
        </a>
        <a href="schedule.html" class="nav-item">
            <i class="bi bi-calendar-event-fill"></i>
            <span>Calendar</span>
        </a>
        <a href="add_friends.html" class="nav-item">
            <i class="bi bi-person-plus-fill"></i>
            <span>Add</span>
        </a>
        <div class="nav-item" id="moreMenuBtn">
            <i class="bi bi-grid-fill"></i>
            <span>More</span>
        </div>
    </div>

    <!-- ====== Moreメニューポップアップ ====== -->
    <div id="moreMenuPopup" style="display: none; position: fixed; bottom: 80px; left: 16px; right: 16px; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 8px 40px rgba(0,0,0,0.12); z-index: 999; border: 1px solid rgba(0,0,0,0.04);">
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; text-align: center;">
            <a href="guide.html" style="text-decoration: none; color: #333; font-size: 12px;">
                <div style="background: #f0f4f8; border-radius: 14px; padding: 14px;">
                    <i class="bi bi-book" style="font-size: 24px; color: #6a1b9a;"></i>
                </div>
                <span style="margin-top: 4px; display: block;">使い方</span>
            </a>
            <a href="privacy.html" style="text-decoration: none; color: #333; font-size: 12px;">
                <div style="background: #f0f4f8; border-radius: 14px; padding: 14px;">
                    <i class="bi bi-shield-lock" style="font-size: 24px; color: #1565c0;"></i>
                </div>
                <span style="margin-top: 4px; display: block;">プライバシー</span>
            </a>
            <a href="terms.html" style="text-decoration: none; color: #333; font-size: 12px;">
                <div style="background: #f0f4f8; border-radius: 14px; padding: 14px;">
                    <i class="bi bi-file-text" style="font-size: 24px; color: #e65100;"></i>
                </div>
                <span style="margin-top: 4px; display: block;">利用規約</span>
            </a>
            <a href="#" id="feedbackMoreBtn" style="text-decoration: none; color: #333; font-size: 12px;">
                <div style="background: #f0f4f8; border-radius: 14px; padding: 14px;">
                    <i class="bi bi-chat-dots" style="font-size: 24px; color: #f9a825;"></i>
                </div>
                <span style="margin-top: 4px; display: block;">フィードバック</span>
            </a>
            <a href="#" id="logoutMoreBtn" style="text-decoration: none; color: #333; font-size: 12px;">
                <div style="background: #f0f4f8; border-radius: 14px; padding: 14px;">
                    <i class="bi bi-box-arrow-right" style="font-size: 24px; color: #e53935;"></i>
                </div>
                <span style="margin-top: 4px; display: block;">ログアウト</span>
            </a>
        </div>
        <div style="text-align: center; margin-top: 12px;">
            <button onclick="document.getElementById('moreMenuPopup').style.display='none'" style="background: none; border: none; color: #999; font-size: 13px; padding: 4px 16px;">閉じる</button>
        </div>
    </div>
    `;

    // ====== レンダリング ======
    renderPage('友助 - トップ', content, `
        <style>
            /* ====== 完全白背景 ====== */
            body {
                background: #ffffff;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                padding-bottom: 80px;
                min-height: 100vh;
                margin: 0;
            }

            /* ====== ヘッダー ====== */
            .header-section {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 16px 20px 8px 20px;
                background: transparent;
            }
            .header-left {
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .logo-icon { font-size: 26px; }
            .logo-title {
                font-size: 18px;
                font-weight: 700;
                color: #06C755;
            }
            .logo-sub {
                font-size: 10px;
                color: #999;
                background: #f0f4f8;
                padding: 2px 8px;
                border-radius: 999px;
                margin-left: 4px;
            }
            .header-right {
                display: flex;
                align-items: center;
            }
            .profile-icon {
                font-size: 30px;
                color: #06C755;
                cursor: pointer;
            }

            /* ====== メイン画像（日付：上／検索窓：下部に重ねる） ====== */
            .main-image-wrapper {
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 4px 16px 8px 16px;
            }
            .main-image-container {
                position: relative;
                width: 100%;
                max-width: 420px;
                border-radius: 20px;
                overflow: hidden;
                box-shadow: 0 4px 16px rgba(0,0,0,0.06);
                background: white;
            }
            .main-image {
                width: 100%;
                height: auto;
                display: block;
            }

            /* 日付（画像の上部に重ねる） */
            .image-date {
                position: absolute;
                top: 16px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(255,255,255,0.92);
                backdrop-filter: blur(8px);
                padding: 6px 18px;
                border-radius: 999px;
                font-size: 14px;
                font-weight: 600;
                color: #333;
                box-shadow: 0 2px 8px rgba(0,0,0,0.04);
                border: 1px solid rgba(255,255,255,0.6);
                letter-spacing: 0.3px;
                white-space: nowrap;
            }

            /* 検索窓（画像の下部に重ねる） */
            .image-search {
                position: absolute;
                bottom: 16px;
                left: 50%;
                transform: translateX(-50%);
                width: 88%;
                max-width: 360px;
            }
            .image-search .search-box {
                display: flex;
                align-items: center;
                background: rgba(255,255,255,0.95);
                backdrop-filter: blur(8px);
                border-radius: 12px;
                padding: 10px 16px;
                gap: 10px;
                box-shadow: 0 2px 12px rgba(0,0,0,0.06);
                border: 1px solid rgba(255,255,255,0.6);
                transition: all 0.2s;
            }
            .image-search .search-box:focus-within {
                border-color: #06C755;
                box-shadow: 0 2px 16px rgba(6,199,85,0.10);
                background: white;
            }
            .image-search .search-box i {
                color: #999;
                font-size: 16px;
            }
            .image-search .search-box input {
                border: none;
                background: none;
                outline: none;
                flex: 1;
                font-size: 13px;
                color: #333;
            }
            .image-search .search-box input::placeholder {
                color: #bbb;
                font-weight: 400;
            }

            /* ====== 友達アイコン ====== */
            .friends-avatars {
                padding: 0 16px 16px 16px;
                display: flex;
                align-items: center;
                flex-wrap: wrap;
                gap: 12px;
            }
            .avatars-row {
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
            }
            .avatar-item, .avatars-more {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 4px;
                text-decoration: none;
                color: #333;
            }
            .avatar-circle {
                width: 52px;
                height: 52px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 16px;
                font-weight: 600;
                color: #333;
                border: 2px solid white;
                box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            }
            .more-circle {
                background: #f0f4f8 !important;
                border: 2px dashed #ccc;
                color: #999;
                font-size: 18px;
            }
            .avatar-name {
                font-size: 10px;
                color: #888;
                max-width: 52px;
                text-overflow: ellipsis;
                overflow: hidden;
                white-space: nowrap;
                text-align: center;
            }

            /* ====== 今日の予定 ====== */
            .today-section {
                background: white;
                margin: 0 16px 16px 16px;
                border-radius: 16px;
                padding: 16px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.04);
                border: 1px solid #f0f4f8;
            }
            .today-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 14px;
                font-weight: 600;
                color: #333;
                margin-bottom: 10px;
            }
            .today-header i { color: #06C755; margin-right: 6px; }
            .today-more {
                font-size: 12px;
                font-weight: 400;
                color: #06C755;
                text-decoration: none;
            }
            .today-item {
                display: flex;
                align-items: center;
                padding: 8px 0;
                border-bottom: 1px solid #f0f4f8;
                gap: 10px;
            }
            .today-item:last-child { border-bottom: none; }
            .today-time {
                font-size: 12px;
                font-weight: 600;
                color: #06C755;
                min-width: 44px;
            }
            .today-title {
                font-size: 13px;
                color: #333;
                flex: 1;
            }
            .today-person {
                font-size: 11px;
                color: #888;
                background: #f0f4f8;
                padding: 2px 10px;
                border-radius: 999px;
            }

            /* ====== 下部ナビゲーション ====== */
            .bottom-nav {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: white;
                display: flex;
                justify-content: space-around;
                align-items: center;
                padding: 6px 8px 14px 8px;
                border-top: 1px solid #f0f4f8;
                box-shadow: 0 -2px 12px rgba(0,0,0,0.04);
                z-index: 100;
            }
            .nav-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 2px;
                text-decoration: none;
                color: #999;
                font-size: 10px;
                cursor: pointer;
                background: none;
                border: none;
                padding: 4px 10px;
                transition: color 0.2s;
            }
            .nav-item i {
                font-size: 20px;
                transition: all 0.2s;
            }
            .nav-item.active {
                color: #06C755;
            }
            .nav-item.active i {
                transform: translateY(-2px);
            }
            .nav-item:active {
                transform: scale(0.92);
            }

            /* ====== ダークモード ====== */
            @media (prefers-color-scheme: dark) {
                body { background: #0d0d1a; }
                .today-section { background: #1a1a2e; border-color: #2a2a3e; }
                .today-header { color: #eee; }
                .today-item { border-color: #2a2a3e; }
                .today-title { color: #eee; }
                .bottom-nav { background: #1a1a2e; border-color: #2a2a3e; }
                .logo-sub { background: #2a2a3e; color: #888; }
                #moreMenuPopup { background: #1a1a2e; border-color: #2a2a3e; }
                #moreMenuPopup a { color: #eee !important; }
                .avatar-name { color: #aaa; }
                .today-person { background: #2a2a3e; color: #aaa; }
                .image-date { background: rgba(26,26,46,0.85); color: #eee; border-color: #2a2a3e; }
                .image-search .search-box { background: rgba(26,26,46,0.9); border-color: #2a2a3e; }
                .image-search .search-box input { color: #eee; }
                .image-search .search-box input::placeholder { color: #666; }
                .image-search .search-box i { color: #666; }
                .main-image { box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
                .profile-icon { color: #06C755; }
            }
        </style>
    `);

    // ====== ページロード後の処理 ======
    afterPageLoad(function() {
        document.getElementById('profileIcon').addEventListener('click', function() {
            const popup = document.getElementById('moreMenuPopup');
            popup.style.display = (popup.style.display === 'none' || popup.style.display === '') ? 'block' : 'none';
        });

        document.getElementById('moreMenuBtn').addEventListener('click', function() {
            const popup = document.getElementById('moreMenuPopup');
            popup.style.display = (popup.style.display === 'none' || popup.style.display === '') ? 'block' : 'none';
        });

        document.getElementById('logoutMoreBtn').addEventListener('click', function(e) {
            e.preventDefault();
            if (confirm('ログアウトしますか？')) {
                logout();
            }
        });

        document.getElementById('feedbackMoreBtn').addEventListener('click', function(e) {
            e.preventDefault();
            if (window.openFeedback) {
                window.openFeedback();
            } else {
                alert('📝 フィードバック機能は準備中です。\ntomosche.line@gmail.com へご連絡ください。');
            }
        });

        document.getElementById('globalSearch').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const query = this.value.trim();
                if (query) {
                    alert(`🔍 「${query}」を検索します（機能は開発中です）`);
                }
            }
        });

        document.addEventListener('click', function(e) {
            const popup = document.getElementById('moreMenuPopup');
            if (popup.style.display === 'block') {
                if (!e.target.closest('#moreMenuPopup') && 
                    !e.target.closest('#moreMenuBtn') && 
                    !e.target.closest('#profileIcon')) {
                    popup.style.display = 'none';
                }
            }
        });
    });
</script>
