<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomosche</title>
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-family: sans-serif;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #06C755;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>読み込み中...</div>
    </div>

    <script>
        const liffId = '2010384200-BS1cr2CR';
        
        window.addEventListener('load', async () => {
            try {
                await liff.init({ liffId: liffId });
                console.log('LIFF initialized');
                
                window.isLoggedIn = liff.isLoggedIn();
                if (window.isLoggedIn) {
                    window.idToken = liff.getIDToken();
                    window.profile = await liff.getProfile();
                    console.log('Logged in as:', window.profile.displayName);
                }
            } catch (err) {
                console.error('LIFF init error:', err);
                window.isLoggedIn = false;
            }
            
            // Flutterアプリを起動
            const script = document.createElement('script');
            script.src = 'flutter_bootstrap.js';
            script.async = false;
            document.body.appendChild(script);
            
            // ローディング表示はFlutterが起動したら消える
        });
    </script>
</body>
</html>
