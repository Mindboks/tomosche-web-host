<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>友助 - Tomosche</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- 共通CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
</head>
<body>

    <!-- ローディングオーバーレイ -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <div>読み込み中...</div>
    </div>

    <!-- メインコンテンツ -->
    <div id="mainContent" style="display: none;">

        <!-- ヒーローエリア -->
        <div class="hero-section">
            <!-- メインタイトル: 友助 (h1) -->
            <h1 class="hero-main-title">友助</h1>
            
            <!-- サブタイトル: Tomosche (h2) -->
            <h2 class="hero-sub-title">Tomosche</h2>
            
            <!-- キャッチコピー -->
            <p class="hero-catchphrase">大切な人と、大切な時間を、もっとスムーズに。</p>
            
            <!-- ユーザー情報 -->
            <div class="hero-user">
                <i class="bi bi-person-circle"></i>
                <span id="userName">読み込み中...</span>
            </div>
        </div>

        <!-- メニューエリア -->
        <div class="menu-section">
            <a href="?page=friends" class="menu-card">
                <div class="menu-icon"><i class="bi bi-people"></i></div>
                <div class="menu-content">
                    <div class="menu-title">友達一覧</div>
                    <p class="menu-desc">登録済みの友達を確認・管理</p>
                </div>
                <div class="menu-arrow"><i class="bi bi-chevron-right"></i></div>
            </a>

            <a href="?page=addfriends" class="menu-card">
                <div class="menu-icon"><i class="bi bi-person-plus"></i></div>
                <div class="menu-content">
                    <div class="menu-title">友達追加・削除</div>
                    <p class="menu-desc">QRコードで招待 / 友達を削除</p>
                </div>
                <div class="menu-arrow"><i class="bi bi-chevron-right"></i></div>
            </a>

            <a href="?page=schedule" class="menu-card">
                <div class="menu-icon"><i class="bi bi-calendar-event"></i></div>
                <div class="menu-content">
                    <div class="menu-title">スケジュール</div>
                    <p class="menu-desc">予定の追加・変更・確認</p>
                </div>
                <div class="menu-arrow"><i class="bi bi-chevron-right"></i></div>
            </a>

            <!-- 予備スペース -->
            <div class="menu-card-placeholder">
                <i class="bi bi-plus-circle"></i> メニュー追加予定
            </div>

            <div class="logout-area">
                <a href="#" id="logoutBtn">ログアウト</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- 共通JS -->
    <script src="js/app.js"></script>
    
    <!-- ページ固有JS -->
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const success = await initLiff();
            if (success) {
                setUserName('userName');
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                
                document.getElementById('logoutBtn').addEventListener('click', (e) => {
                    e.preventDefault();
                    logout();
                });
            }
        });
    </script>
</body>
</html>
