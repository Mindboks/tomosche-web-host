<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomosche</title>
    <!-- LIFF SDKを先に読み込む -->
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <style>
        body { margin: 0; padding: 0; }
    </style>
</head>
<body>
    <script>
        // LIFF初期化
        const liffId = '2010384200-BS1cr2CR';
        
        window.addEventListener('load', async () => {
            try {
                await liff.init({ liffId: liffId });
                console.log('LIFF initialized');
                window.isLoggedIn = liff.isLoggedIn();
                if (window.isLoggedIn) {
                    window.idToken = liff.getIDToken();
                    window.profile = await liff.getProfile();
                    console.log('Logged in:', window.profile?.displayName);
                }
            } catch (err) {
                console.error('LIFF error:', err);
                window.isLoggedIn = false;
            }
            
            // Flutterアプリを起動（オリジナルのコードを実行）
            const script = document.createElement('script');
            script.src = 'flutter_bootstrap.js';
            script.async = false;
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
