<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>友達追加 - Tomosche</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        html, body { background: #ffffff !important; margin: 0; padding: 0; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .container { background: #ffffff; padding: 16px; padding-bottom: 100px; }
        .back-btn { background: none; border: none; font-size: 24px; color: #06C755; padding: 0; margin-right: 8px; cursor: pointer; }
        .page-title { font-size: clamp(1.2rem, 4vw, 1.8rem); font-weight: 600; margin: 0; color: #333; }
        .qr-container { background: white; border-radius: 24px; padding: 32px 20px; text-align: center; border: 1px solid #f0f4f8; margin-top: 20px; }
        .qr-container h5 { font-weight: 600; margin-bottom: 8px; }
        .qr-container p { font-size: 14px; color: #888; margin-bottom: 20px; }
        #qrcode { display: inline-block; background: white; padding: 12px; border-radius: 16px; border: 1px solid #f0f4f8; }
        .send-btn { background: #06C755; color: white; border: none; padding: 14px; border-radius: 999px; font-size: 16px; font-weight: 600; width: 100%; margin-top: 16px; cursor: pointer; }
        .send-btn:hover { background: #049a44; }
        .add-note { font-size: 12px; color: #aaa; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex align-items-center mb-2">
            <button class="back-btn" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>
            <h1 class="page-title">友達追加</h1>
        </div>
        <div class="qr-container">
            <h5>QRコードで招待</h5>
            <p>友達にこのQRコードを読み取ってもらってください</p>
            <div id="qrcode"></div>
            <button class="send-btn" id="sendLineBtn"><i class="bi bi-line me-2"></i>LINEで送る</button>
            <div class="add-note">友達がQRコードを読み取ると、自動的に友達一覧に追加されます</div>
        </div>
    </div>

    <!-- ====== 下部ナビゲーション ====== -->
    <div style="position: fixed; bottom: 0; left: 0; right: 0; background: #ffffff; display: flex; justify-content: space-around; align-items: center; padding: 6px 8px 14px 8px; border-top: 1px solid #f0f4f8; box-shadow: 0 -2px 12px rgba(0,0,0,0.04); z-index: 100;">
        <a href="/" style="display: flex; flex-direction: column; align-items: center; gap: 2px; text-decoration: none; color: #999; font-size: 10px; padding: 4px 10px;">
            <i class="bi bi-house-fill" style="font-size: 20px;"></i><span>Home</span>
        </a>
        <a href="friends.html" style="display: flex; flex-direction: column; align-items: center; gap: 2px; text-decoration: none; color: #999; font-size: 10px; padding: 4px 10px;">
            <i class="bi bi-people-fill" style="font-size: 20px;"></i><span>Friends</span>
        </a>
        <a href="schedule.html" style="display: flex; flex-direction: column; align-items: center; gap: 2px; text-decoration: none; color: #999; font-size: 10px; padding: 4px 10px;">
            <i class="bi bi-calendar-event-fill" style="font-size: 20px;"></i><span>Calendar</span>
        </a>
        <a href="add_friends.html" style="display: flex; flex-direction: column; align-items: center; gap: 2px; text-decoration: none; color: #06C755; font-size: 10px; padding: 4px 10px;">
            <i class="bi bi-person-plus-fill" style="font-size: 20px;"></i><span>Add</span>
        </a>
        <div id="moreMenuBtn" style="display: flex; flex-direction: column; align-items: center; gap: 2px; color: #999; font-size: 10px; padding: 4px 10px; cursor: pointer;">
            <i class="bi bi-grid-fill" style="font-size: 20px;"></i><span>More</span>
        </div>
    </div>

    <!-- Moreメニュー -->
    <div id="moreMenuPopup" style="display:none; position:fixed; bottom:80px; left:16px; right:16px; background:white; border-radius:20px; padding:20px; box-shadow:0 8px 40px rgba(0,0,0,0.12); z-index:999; border:1px solid rgba(0,0,0,0.04);">
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; text-align:center;">
            <a href="guide.html" style="text-decoration:none; color:#333; font-size:12px;">
                <div style="background:#f0f4f8; border-radius:14px; padding:14px;"><i class="bi bi-book" style="font-size:24px; color:#6a1b9a;"></i></div>
                <span style="margin-top:4px; display:block;">使い方</span>
            </a>
            <a href="privacy.html" style="text-decoration:none; color:#333; font-size:12px;">
                <div style="background:#f0f4f8; border-radius:14px; padding:14px;"><i class="bi bi-shield-lock" style="font-size:24px; color:#1565c0;"></i></div>
                <span style="margin-top:4px; display:block;">プライバシー</span>
            </a>
            <a href="terms.html" style="text-decoration:none; color:#333; font-size:12px;">
                <div style="background:#f0f4f8; border-radius:14px; padding:14px;"><i class="bi bi-file-text" style="font-size:24px; color:#e65100;"></i></div>
                <span style="margin-top:4px; display:block;">利用規約</span>
            </a>
            <a href="#" id="feedbackMoreBtn" style="text-decoration:none; color:#333; font-size:12px;">
                <div style="background:#f0f4f8; border-radius:14px; padding:14px;"><i class="bi bi-chat-dots" style="font-size:24px; color:#f9a825;"></i></div>
                <span style="margin-top:4px; display:block;">フィードバック</span>
            </a>
            <a href="#" id="logoutMoreBtn" style="text-decoration:none; color:#333; font-size:12px;">
                <div style="background:#f0f4f8; border-radius:14px; padding:14px;"><i class="bi bi-box-arrow-right" style="font-size:24px; color:#e53935;"></i></div>
                <span style="margin-top:4px; display:block;">ログアウト</span>
            </a>
        </div>
        <div style="text-align:center; margin-top:12px;">
            <button onclick="document.getElementById('moreMenuPopup').style.display='none'" style="background:none; border:none; color:#999; font-size:13px; padding:4px 16px; cursor:pointer;">閉じる</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const success = await initLiff();
            if (success) {
                let currentUserId = '';
                if (currentUser && currentUser.userId) currentUserId = currentUser.userId;
                else {
                    try {
                        const profile = await liff.getProfile();
                        currentUserId = profile.userId;
                    } catch(e) {}
                }
                const inviteUrl = `https://tomosche.com/add_friends.html?invite_by=${currentUserId}`;
                new QRCode(document.getElementById('qrcode'), { text: inviteUrl, width: 200, height: 200 });
                document.getElementById('sendLineBtn').addEventListener('click', function() {
                    liff.sendMessages([{ type: 'text', text: `🌱 Tomosche（友助）に招待します！\n${inviteUrl}` }])
                        .then(() => liff.closeWindow())
                        .catch(() => alert('送信に失敗しました'));
                });
            }

            // Moreメニュー
            document.getElementById('moreMenuBtn').addEventListener('click', function() {
                const popup = document.getElementById('moreMenuPopup');
                popup.style.display = (popup.style.display === 'none' || popup.style.display === '') ? 'block' : 'none';
            });

            document.getElementById('logoutMoreBtn').addEventListener('click', function(e) {
                e.preventDefault();
                if (confirm('ログアウトしますか？')) logout();
            });

            document.getElementById('feedbackMoreBtn').addEventListener('click', function(e) {
                e.preventDefault();
                alert('📝 フィードバック機能は準備中です。\ntomosche.line@gmail.com へご連絡ください。');
            });

            document.addEventListener('click', function(e) {
                const popup = document.getElementById('moreMenuPopup');
                if (popup.style.display === 'block') {
                    if (!e.target.closest('#moreMenuPopup') && !e.target.closest('#moreMenuBtn')) {
                        popup.style.display = 'none';
                    }
                }
            });
        });
    </script>
</body>
</html>
