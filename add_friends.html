<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Add Friends - Tomosche</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-auth-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/app.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="d-flex align-items-center mb-2">
            <button class="back-btn" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>
            <h1 class="page-title">Add Friends</h1>
        </div>
        <div class="qr-box">
            <h5>Invite via QR Code</h5>
            <p>Have your friend scan this QR code</p>
            <div id="qrcode"></div>
            <button class="send-btn" id="sendBtn"><i class="bi bi-line me-2"></i>Send via LINE</button>
            <div class="note">When your friend scans the QR code, they will be automatically added</div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="/" class="nav-item"><i class="bi bi-house-fill"></i><span>Home</span></a>
        <a href="friends.html" class="nav-item"><i class="bi bi-people-fill"></i><span>Friends</span></a>
        <a href="schedule.html" class="nav-item"><i class="bi bi-calendar-event-fill"></i><span>Calendar</span></a>
        <a href="add_friends.html" class="nav-item active"><i class="bi bi-person-plus-fill"></i><span>Add</span></a>
        <div class="nav-item" id="moreMenuBtn"><i class="bi bi-grid-fill"></i><span>More</span></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            let uid = '';
            try {
                await liff.init({ liffId: '2010384200-BS1cr2CR' });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const p = await liff.getProfile();
                uid = p.userId;
            } catch(e) { console.error(e); }
            const url = `https://tomosche.com/add_friends.html?invite_by=${uid}`;
            new QRCode(document.getElementById('qrcode'), { text: url, width: 200, height: 200 });
            document.getElementById('sendBtn').addEventListener('click', function() {
                liff.sendMessages([{ type: 'text', text: `🌱 Tomosche invitation!\n${url}` }])
                    .then(() => liff.closeWindow())
                    .catch(() => alert('Failed to send'));
            });
        });
    </script>
</body>
</html>
