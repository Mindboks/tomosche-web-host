<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>友達追加 - Tomosche</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: #06C755;
            padding: 0;
            margin-right: 8px;
        }
        .page-title {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 600;
            margin: 0;
            color: #333;
        }
        .qr-container {
            background: white;
            border-radius: 24px;
            padding: 32px 20px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-top: 20px;
        }
        .qr-container h5 {
            font-weight: 600;
            margin-bottom: 8px;
        }
        .qr-container p {
            font-size: 14px;
            color: #888;
            margin-bottom: 20px;
        }
        #qrcode {
            display: inline-block;
            background: white;
            padding: 12px;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .invite-url {
            font-size: 11px;
            color: #2196f3;
            word-break: break-all;
            margin-top: 16px;
            background: #f5f7fa;
            padding: 10px 14px;
            border-radius: 12px;
        }
        .send-btn {
            background: #06C755;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            margin-top: 16px;
            transition: background 0.2s;
        }
        .send-btn:hover {
            background: #049a44;
        }
        .send-btn:active {
            transform: scale(0.97);
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        .empty-state i {
            font-size: 48px;
            color: #ddd;
        }
    </style>
</head>
<body>
    <div class="container py-3">
        <!-- ヘッダー -->
        <div class="d-flex align-items-center mb-2">
            <button class="back-btn" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>
            <h1 class="page-title">友達追加</h1>
        </div>

        <!-- QRコード招待 -->
        <div class="qr-container">
            <h5>📱 QRコードで招待</h5>
            <p>友達にこのQRコードを読み取ってもらってください</p>
            <div id="qrcode"></div>
            <div class="invite-url" id="inviteUrl">読み込み中...</div>
            <button class="send-btn" id="sendLineBtn">
                <i class="bi bi-line me-2"></i>LINEで送る
            </button>
        </div>

        <!-- 注意書き -->
        <div class="mt-3 text-center" style="font-size: 12px; color: #aaa;">
            <i class="bi bi-info-circle"></i>
            友達がQRコードを読み取ると、自動的に友達一覧に追加されます
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        let currentUserId = '';

        document.addEventListener('DOMContentLoaded', async () => {
            const success = await initLiff();
            if (!success) {
                window.location.href = '/';
                return;
            }

            // ユーザーIDを取得
            if (currentUser && currentUser.userId) {
                currentUserId = currentUser.userId;
            } else {
                // 念のためLIFFから直接取得
                try {
                    const profile = await liff.getProfile();
                    currentUserId = profile.userId;
                } catch (e) {
                    console.error('Profile error:', e);
                }
            }

            // 招待URLを生成
            const inviteUrl = `https://tomosche-web-host.onrender.com?invite_by=${currentUserId}`;
            document.getElementById('inviteUrl').textContent = inviteUrl;

            // QRコード生成
            document.getElementById('qrcode').innerHTML = '';
            new QRCode(document.getElementById('qrcode'), {
                text: inviteUrl,
                width: 200,
                height: 200
            });

            // LINE送信ボタン
            document.getElementById('sendLineBtn').addEventListener('click', () => {
                liff.sendMessages([{
                    type: 'text',
                    text: `🌱 Tomosche（友助）に招待します！\n以下のリンクから登録してください。\n${inviteUrl}`
                }]).then(() => {
                    liff.closeWindow();
                }).catch(err => {
                    console.error('Send error:', err);
                    alert('メッセージ送信に失敗しました');
                });
            });
        });
    </script>
</body>
</html>
