<script src="js/template.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
    const content = `
    <div class="container" style="background:#ffffff; min-height:100vh;">
        <div class="d-flex align-items-center mb-2">
            <button class="back-btn" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>
            <h1 class="page-title">友達追加</h1>
        </div>
        <div style="background:white; border-radius:24px; padding:32px 20px; text-align:center; box-shadow:0 2px 12px rgba(0,0,0,0.06); margin-top:20px;">
            <h5 style="font-weight:600; margin-bottom:8px;">QRコードで招待</h5>
            <p style="font-size:14px; color:#888; margin-bottom:20px;">友達にこのQRコードを読み取ってもらってください</p>
            <div id="qrcode" style="display:inline-block; background:white; padding:12px; border-radius:16px; box-shadow:0 2px 12px rgba(0,0,0,0.06);"></div>
            <button class="send-btn" id="sendLineBtn" style="background:#06C755; color:white; border:none; padding:14px; border-radius:999px; font-size:16px; font-weight:600; width:100%; margin-top:16px; cursor:pointer;">
                <i class="bi bi-line me-2"></i>LINEで送る
            </button>
            <div style="font-size:12px; color:#aaa; margin-top:16px;">友達がQRコードを読み取ると、自動的に友達一覧に追加されます</div>
        </div>
    </div>
    `;

    renderPage('友達追加', content, `
        <style>
            .send-btn:hover { background: #049a44; }
        </style>
    `);

    afterPageLoad(function() {
        let currentUserId = '';
        if (currentUser && currentUser.userId) currentUserId = currentUser.userId;
        else {
            liff.getProfile().then(profile => { currentUserId = profile.userId; });
        }
        const inviteUrl = `https://tomosche.com/add_friends.html?invite_by=${currentUserId}`;
        new QRCode(document.getElementById('qrcode'), { text: inviteUrl, width: 200, height: 200 });
        document.getElementById('sendLineBtn').addEventListener('click', function() {
            liff.sendMessages([{ type: 'text', text: `🌱 Tomosche（友助）に招待します！\n${inviteUrl}` }])
                .then(() => liff.closeWindow())
                .catch(() => alert('送信に失敗しました'));
        });
    });
</script>
