<script src="js/template.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
    const content = `
    <div style="padding:16px 0;">
        <div class="d-flex align-items-center mb-2">
            <button class="back-btn" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>
            <h1 class="page-title">友達追加</h1>
        </div>
        <div style="background:white;border-radius:24px;padding:32px 20px;text-align:center;border:1px solid #f0f4f8;margin-top:12px;">
            <h5 style="font-weight:600;margin-bottom:8px;">QRコードで招待</h5>
            <p style="font-size:14px;color:#888;margin-bottom:20px;">友達にこのQRコードを読み取ってもらってください</p>
            <div id="qrcode" style="display:inline-block;background:white;padding:12px;border-radius:16px;border:1px solid #f0f4f8;"></div>
            <button id="sendBtn" style="background:#06C755;color:white;border:none;padding:14px;border-radius:999px;font-size:16px;font-weight:600;width:100%;margin-top:16px;cursor:pointer;"><i class="bi bi-line me-2"></i>LINEで送る</button>
            <div style="font-size:12px;color:#aaa;margin-top:16px;">友達がQRコードを読み取ると、自動的に友達一覧に追加されます</div>
        </div>
    </div>
    `;

    renderPage('友達追加', content);
    document.addEventListener('DOMContentLoaded', async function() {
        let uid = '';
        try {
            await liff.init({ liffId: '2010384200-BS1cr2CR' });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const p = await liff.getProfile();
            uid = p.userId;
        } catch(e) {}
        const url = `https://tomosche.com/add_friends.html?invite_by=${uid}`;
        new QRCode(document.getElementById('qrcode'), { text: url, width: 200, height: 200 });
        document.getElementById('sendBtn').addEventListener('click', function() {
            liff.sendMessages([{ type: 'text', text: `🌱 Tomosche（友助）に招待します！\n${url}` }])
                .then(() => liff.closeWindow())
                .catch(() => alert('送信に失敗しました'));
        });
    });
</script>
